<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IELTS Listening Test — ViATestPrep</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700;800&family=Fraunces:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --paper: #fffefb;
      --page-bg: #eae6dc;
      --ink: #1c1a17;
      --ink-soft: #4a453d;
      --rule: rgba(28, 26, 23, 0.14);
      --rule-soft: rgba(28, 26, 23, 0.08);
      --accent: #7a2331;
      --accent-soft: #f6e9ea;
      --gold: #a8792f;
    }
    body { background: var(--page-bg); color: var(--ink); font-family: "Inter", sans-serif; margin: 0; }

    .site-header {
      background: var(--paper); border-bottom: 1px solid var(--rule); height: 62px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; position: sticky; top: 0; z-index: 50;
      box-shadow: 0 1px 0 rgba(0,0,0,.02);
    }
    .exit-link { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--rule); font-size: 12px; font-weight: 700; color: var(--ink-soft); text-decoration: none; font-family: "Inter", sans-serif; transition: background .15s; }
    .exit-link:hover { background: var(--rule-soft); }
    .book-badge { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: .1em; }
    .test-title { font-size: 14px; font-weight: 700; color: var(--ink); font-family: "Fraunces", serif; }
    .mode-tag { font-size: 11px; color: var(--ink-soft); font-weight: 600; }
    .timer-pill { display: flex; align-items: center; gap: 6px; background: var(--accent-soft); border: 1px solid rgba(122,35,49,.18); border-radius: 20px; padding: 5px 14px; }
    .timer-text { font-size: 13px; font-weight: 800; font-family: "JetBrains Mono", monospace; color: var(--accent); }
    .submit-btn { padding: 7px 18px; border-radius: 9px; background: var(--accent); color: #fff; border: none; font-size: 12px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(122,35,49,.25); font-family: "Inter", sans-serif; transition: background .15s; }
    .submit-btn:hover { background: #5e1a25; }

    .main-layout { display: flex; height: calc(100vh - 62px - 62px); overflow: hidden; }

    .audio-panel {
      width: 330px; flex-shrink: 0; background: var(--paper);
      border-right: 1px solid var(--rule); overflow-y: auto;
      display: flex; flex-direction: column; padding: 18px; gap: 16px;
    }
    .section-tabs { display: flex; gap: 6px; border-bottom: 1px solid var(--rule); padding-bottom: 12px; flex-wrap: wrap; }
    .section-tab {
      padding: 6px 13px; border-radius: 7px; font-size: 11.5px; font-weight: 700;
      cursor: pointer; border: 1px solid var(--rule); color: var(--ink-soft); background: var(--paper); transition: all .18s; font-family: "Inter", sans-serif;
    }
    .section-tab:hover { background: var(--rule-soft); }
    .section-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    .audio-card {
      background: linear-gradient(180deg, #fbf7ee 0%, #f6f1e4 100%);
      border: 1px solid rgba(168,121,47,.25); border-radius: 14px; padding: 18px;
    }
    .audio-card .sec-label { font-size: 10px; font-weight: 800; color: var(--gold); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 3px; }
    .audio-card h3 { font-size: 15px; font-weight: 700; color: var(--ink); margin: 0 0 14px; font-family: "Fraunces", serif; }

    .timeline-bar {
      -webkit-appearance: none; width: 100%; height: 4px; border-radius: 4px;
      background: rgba(168,121,47,.25); cursor: pointer; margin-bottom: 4px; display: block;
    }
    .timeline-bar::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
      background: var(--gold); cursor: pointer; box-shadow: 0 0 0 3px rgba(168,121,47,.2);
    }
    .time-labels { display: flex; justify-content: space-between; font-size: 10px; font-family: "JetBrains Mono", monospace; color: var(--ink-soft); margin-bottom: 12px; }

    .controls-row { display: flex; align-items: center; justify-content: space-between; }
    .play-btn {
      width: 42px; height: 42px; border-radius: 50%; background: var(--accent); color: #fff;
      border: none; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(122,35,49,.3); transition: background .15s, transform .1s;
    }
    .play-btn:hover { background: #5e1a25; transform: scale(1.05); }
    .stop-btn {
      width: 30px; height: 30px; border-radius: 50%; background: var(--paper); border: 1px solid var(--rule);
      color: var(--ink-soft); cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: background .15s;
    }
    .stop-btn:hover { background: var(--rule-soft); }
    .speed-select {
      background: var(--paper); border: 1px solid var(--rule); border-radius: 7px;
      padding: 4px 8px; font-size: 11px; font-weight: 700; color: var(--accent); cursor: pointer; outline: none; font-family: "Inter", sans-serif;
    }
    .notice-box {
      font-size: 11px; color: #4a4530; background: #f6f1e4;
      border: 1px solid rgba(168,121,47,.25); border-radius: 10px; padding: 11px 13px; line-height: 1.55;
    }
    .transcript-box {
      background: var(--paper); border: 1px solid var(--rule); border-radius: 10px; padding: 14px;
      font-size: 12px; color: var(--ink-soft); max-height: 220px; overflow-y: auto; line-height: 1.7; font-family: "Lora", serif;
    }
    .transcript-box .transcript-gap { color: #a8792f; font-style: italic; border-top: 1px dashed rgba(168,121,47,.4); padding-top: 8px; margin-top: 8px; }

    .questions-panel { flex: 1; overflow-y: auto; padding: 28px 30px 60px; background: var(--page-bg); }
    .paper-sheet {
      max-width: 720px; margin: 0 auto; background: var(--paper); border: 1px solid var(--rule);
      border-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 12px 32px rgba(28,26,23,.05);
      padding: 34px 40px 44px;
    }
    .part-heading {
      font-family: "Fraunces", serif; font-size: 20px; font-weight: 800; color: var(--ink);
      border-bottom: 2px solid var(--ink); padding-bottom: 10px; margin-bottom: 18px; letter-spacing: .01em;
    }

    .instruction-banner {
      background: transparent; border-left: 3px solid var(--gold); border-radius: 0;
      padding: 4px 0 4px 16px; margin: 22px 0 16px; font-size: 13.5px; color: var(--ink-soft);
      font-family: "Lora", serif; font-style: italic; line-height: 1.6;
    }
    .instruction-banner strong, .instruction-banner b { font-style: normal; color: var(--ink); }

    .q-card {
      background: var(--paper); border: 1px solid var(--rule-soft); border-radius: 10px;
      padding: 16px 18px; margin-bottom: 12px; transition: border-color .2s, box-shadow .2s;
    }
    .q-card:hover { border-color: rgba(122,35,49,.25); }
    .q-card.flagged { border-color: var(--gold) !important; background: #fdf8ee; }
    .q-card.answered { border-color: rgba(122,35,49,.2); }
    .q-card.unavailable { border-color: rgba(28,26,23,.12); background: #f4f2ec; }

    .q-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; gap: 10px; }
    .q-num-badge {
      display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px;
      border-radius: 50%; border: 1.5px solid var(--ink); font-family: "Fraunces", serif; font-weight: 800;
      font-size: 12px; color: var(--ink); flex-shrink: 0;
    }
    .q-review-label { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #9c9385; cursor: pointer; user-select: none; }
    .q-review-label input[type="checkbox"] { accent-color: var(--gold); width: 13px; height: 13px; }

    .q-body { font-size: 14.5px; font-weight: 500; color: var(--ink); line-height: 1.85; font-family: "Lora", serif; }
    .q-unavailable-note { font-size: 12.5px; color: #8a8375; font-style: italic; font-family: "Lora", serif; }

    .form-panel {
      background: var(--paper); border: 1.5px solid var(--rule-soft); border-radius: 10px;
      margin-bottom: 16px; overflow: hidden;
    }
    .form-row { padding: 11px 18px; border-bottom: 1px solid var(--rule-soft); transition: background .15s; }
    .form-row:last-child { border-bottom: none; }
    .form-row:hover { background: var(--accent-soft); }
    .form-row.flagged { background: #fdf8ee; }
    .form-row-main { display: flex; align-items: baseline; gap: 12px; }
    .form-row-num {
      display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px;
      border-radius: 50%; border: 1.5px solid var(--ink); font-family: "Fraunces", serif; font-weight: 800;
      font-size: 11px; color: var(--ink); flex-shrink: 0;
    }
    .form-row-body { flex: 1; font-size: 14.5px; font-weight: 500; color: var(--ink); line-height: 1.7; font-family: "Lora", serif; }
    .form-row-review { flex-shrink: 0; }
    .form-row-practice { display: flex; align-items: center; gap: 10px; margin-top: 9px; padding-left: 34px; }

    .q-blank-input {
      display: inline-block; min-width: 130px; border: none;
      border-bottom: 2px solid var(--accent); background: transparent;
      color: var(--ink); font-weight: 700; font-size: 14px; font-family: "Inter", sans-serif;
      padding: 0 4px 2px; outline: none; vertical-align: middle;
      transition: border-color .2s; text-align: center;
    }
    .q-blank-input:focus { border-color: var(--gold); background: #f6f1e4; border-radius: 4px 4px 0 0; }
    .q-blank-input::placeholder { color: #c9b98a; font-weight: 400; font-size: 12px; }

    .diagram-panel {
      background: var(--paper); border: 1px solid var(--rule); border-radius: 10px;
      padding: 16px; margin: 0 0 16px; text-align: center;
    }
    .diagram-panel img { max-width: 100%; height: auto; border-radius: 4px; }

    .matching-row {
      display: flex; align-items: center; justify-content: space-between; gap: 14px;
      padding: 11px 16px; border-bottom: 1px solid var(--rule-soft);
    }
    .matching-row:last-child { border-bottom: none; }
    .matching-row.flagged { background: #fdf8ee; }
    .matching-row-label { display: flex; align-items: baseline; gap: 12px; flex: 1; }
    .matching-row-body { font-size: 14.5px; font-weight: 500; color: var(--ink); font-family: "Lora", serif; }
    .letter-choice-row { display: flex; gap: 6px; flex-shrink: 0; }
    .letter-btn {
      width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--rule);
      background: var(--paper); font-size: 12.5px; font-weight: 800; color: var(--ink-soft);
      cursor: pointer; font-family: "Inter", sans-serif; transition: all .15s;
    }
    .letter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .letter-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

    .mcq-options { display: flex; flex-direction: column; gap: 7px; margin-top: 11px; }
    .mcq-option {
      display: flex; align-items: flex-start; gap: 10px; padding: 9px 13px;
      border-radius: 8px; border: 1.5px solid var(--rule); cursor: pointer;
      font-size: 13.5px; color: var(--ink-soft); font-family: "Lora", serif; transition: all .15s;
    }
    .mcq-option:hover { background: var(--accent-soft); border-color: rgba(122,35,49,.3); }
    .mcq-option.selected { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 700; }
    .mcq-option .opt-letter { font-weight: 800; color: var(--accent); min-width: 16px; font-family: "Inter", sans-serif; }
    .mcq-option.selected .opt-letter { color: var(--accent); }

    .check-btn {
      padding: 6px 14px; background: #2f7a52; color: #fff; border: none;
      border-radius: 7px; font-size: 11px; font-weight: 700; cursor: pointer; transition: background .15s; font-family: "Inter", sans-serif;
    }
    .check-btn:hover { background: #245e3f; }
    .feedback-correct { margin-top: 10px; padding: 10px 13px; border-radius: 8px; background: #eef6f0; border: 1px solid #a9d4b8; font-size: 12px; color: #245e3f; font-family: "Inter", sans-serif; }
    .feedback-wrong { margin-top: 10px; padding: 10px 13px; border-radius: 8px; background: #faeeec; border: 1px solid #e3b4ab; font-size: 12px; color: #8a2c1f; font-family: "Inter", sans-serif; }

    .bottom-nav {
      height: 62px; background: var(--paper); border-top: 1px solid var(--rule);
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px; gap: 10px;
    }
    .q-tray { display: flex; align-items: center; gap: 4px; overflow-x: auto; flex: 1; padding: 4px 0; }
    .q-tray::-webkit-scrollbar { height: 3px; }
    .q-tray::-webkit-scrollbar-thumb { background: rgba(168,121,47,.35); border-radius: 4px; }
    .q-nav-btn {
      width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--rule); background: var(--paper);
      font-size: 11px; font-weight: 700; color: var(--ink-soft); cursor: pointer; font-family: "Inter", sans-serif;
      display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; position: relative;
    }
    .q-nav-btn:hover { border-color: var(--gold); background: #f6f1e4; color: var(--ink); }
    .q-nav-btn.answered { background: var(--accent); border-color: var(--accent); color: #fff; }
    .q-nav-btn.current { box-shadow: 0 0 0 2.5px var(--gold); }
    .q-nav-btn.flagged::after { content: "\25CF"; font-size: 7px; color: var(--gold); position: absolute; top: -4px; right: -4px; }

    /* IELTS Mirror Enhancement Styles */
    .timer-pill.timer-flash {
      animation: ielts-flash-red 1s infinite !important;
    }
    @keyframes ielts-flash-red {
      0%, 100% { background-color: #f6e9ea; border-color: rgba(122,35,49,.18); color: #7a2331; }
      50% { background-color: #7a2331; border-color: #7a2331; color: #ffffff; }
    }

    .nav-btns { display: flex; gap: 7px; }
    .nav-arrow {
      padding: 7px 15px; border-radius: 9px; border: 1.5px solid var(--rule); background: var(--paper);
      font-size: 12px; font-weight: 700; color: var(--ink-soft); cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 4px; font-family: "Inter", sans-serif;
    }
    .nav-arrow:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

    .review-card { background: var(--paper); border-radius: 10px; border: 1.5px solid; padding: 16px 18px; margin-bottom: 12px; }
    .review-card.correct { border-color: #a9d4b8; background: #f6faf7; }
    .review-card.wrong { border-color: #e3b4ab; background: #fdf6f5; }
    .review-card.excluded { border-color: var(--rule); background: #f4f2ec; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(168,121,47,.3); border-radius: 4px; }
  
    /* Inline fill inputs inside summary/notes/table preview blocks */
    .fill-group-card {
      border: 1px solid var(--rule-soft); background: var(--paper); border-radius: 10px;
      padding: 18px 20px; margin-bottom: 12px;
    }
    .fill-group-card.has-flagged { border-color: var(--gold); background: #fdf8ee; }
    .fill-group-body {
      font-family: "Lora", serif; font-size: 14px; line-height: 2.1; color: var(--ink-soft);
    }
    .fill-group-body br { display: block; margin: 0; }
    .inline-fill-wrap {
      display: inline-flex; align-items: center; gap: 4px;
      vertical-align: middle; margin: 0 2px;
    }
    .inline-q-num {
      display: inline-flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; border-radius: 50%;
      border: 1.5px solid var(--accent); font-family: "Fraunces", serif; font-weight: 800;
      font-size: 10px; color: var(--accent); flex-shrink: 0; background: var(--paper);
    }
    .inline-fill {
      display: inline-block; width: 130px; background: var(--paper);
      border: none; border-bottom: 2px solid var(--ink); border-radius: 0;
      padding: 1px 6px; color: var(--ink); outline: none;
      font-family: "Inter", sans-serif; font-size: 13px; font-weight: 600;
      transition: border-color 0.2s; vertical-align: middle;
      text-align: center;
    }
    .inline-fill:focus { border-bottom-color: var(--accent); }
    .inline-flag-label {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 10px; color: #9c9385; cursor: pointer; vertical-align: middle;
      margin-left: 3px; user-select: none;
    }
    .inline-flag-label input { accent-color: var(--gold); width: 11px; height: 11px; }
    .fill-group-footer {
      display: flex; justify-content: flex-end; border-top: 1px solid var(--rule-soft);
      margin-top: 14px; padding-top: 10px; gap: 8px;
    }

    /* Slate CSS Helper overrides for premium styled instructions (supports light & dark mode) */
    .bg-slate-50 { background-color: var(--page-bg) !important; opacity: 0.9; }
    .bg-slate-100 { background-color: var(--rule-soft) !important; }
    .border-slate-200 { border-color: var(--rule) !important; }
    .text-slate-700 { color: var(--ink-soft) !important; }
    .text-slate-800 { color: var(--ink) !important; }
    .text-indigo-600 { color: var(--accent) !important; }
    .text-indigo-700 { color: var(--accent) !important; }
    .bg-indigo-100 { background-color: var(--accent-soft) !important; }
    .bg-emerald-100 { background-color: #eef6f0 !important; }
    .text-emerald-700 { color: #245e3f !important; }
    .divide-slate-200 > :not([hidden]) ~ :not([hidden]) { border-color: var(--rule-soft) !important; }
    .list-disc { list-style-type: disc !important; }
    .list-circle { list-style-type: circle !important; }
    .pl-4 { padding-left: 1rem !important; }
    .space-y-1 > :not([hidden]) ~ :not([hidden]) { margin-top: 0.25rem !important; }
    .space-y-2 > :not([hidden]) ~ :not([hidden]) { margin-top: 0.5rem !important; }
    .divide-y > :not([hidden]) ~ :not([hidden]) { border-top: 1px solid var(--rule-soft) !important; }
    .uppercase { text-transform: uppercase !important; }
    .tracking-wider { letter-spacing: 0.05em !important; }
    .font-extrabold { font-weight: 800 !important; }
    .font-bold { font-weight: 700 !important; }
    .overflow-x-auto { overflow-x: auto !important; }
    .min-w-full { min-width: 100% !important; }
    .px-3 { padding-left: 0.75rem !important; padding-right: 0.75rem !important; }
    .py-2 { padding-top: 0.5rem !important; padding-bottom: 0.5rem !important; }
    .w-full { width: 100% !important; }
    .text-left { text-align: left !important; }
    .border-collapse { border-collapse: collapse !important; }
    .border { border: 1px solid var(--rule) !important; }
    .border-white\/10 { border-color: var(--rule-soft) !important; }
    .my-4 { margin-top: 1rem !important; margin-bottom: 1rem !important; }
    .text-xs { font-size: 12px !important; }
    .bg-white\/5 { background-color: var(--rule-soft) !important; }
    .p-2 { padding: 8px !important; }
    .font-semibold { font-weight: 600 !important; }
    .italic { font-style: italic !important; }
    .border-l-2 { border-left: 2px solid var(--gold) !important; }
    .border-stone-500 { border-color: var(--gold) !important; }
    .pl-3 { padding-left: 12px !important; }
    .max-w-full { max-width: 100% !important; }
    .h-auto { height: auto !important; }
    .mx-auto { margin-left: auto !important; margin-right: auto !important; }
    .rounded-xl { border-radius: 12px !important; }
    .shadow-lg { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03) !important; }
    .bg-white { background-color: var(--paper) !important; }

  </style>
  <script src="security.js"></script>
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div style="display:flex;align-items:center;gap:14px;">
      <a href="index.html" class="exit-link">&larr; Exit</a>
      <div>
        <div class="book-badge" id="testSetTag">Test Set</div>
        <div class="test-title" id="testTitle">Loading test...</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span class="mode-tag" id="modeIndicator">Mode: Exam</span>
      <div class="timer-pill">
        <span style="color:var(--accent);font-size:12px;">&#9201;</span>
        <span class="timer-text" id="timerText">30:00</span>
      </div>
    </div>
    <button onclick="submitTest()" id="submitBtn" class="submit-btn">Submit Test</button>
  </header>

  <!-- MAIN -->
  <div class="main-layout">

    <!-- LEFT: Audio Panel -->
    <div class="audio-panel" id="audioContainer">
      <div class="section-tabs" id="sectionTabs"></div>

      <div class="audio-card">
        <div class="sec-label" id="sectionSubLabel">Part 1</div>
        <h3 id="sectionTitle">Section 1</h3>
        <audio id="mainAudio" preload="auto"></audio>
        <input type="range" id="audioTimeline" class="timeline-bar" min="0" max="100" value="0" oninput="seekAudio(this.value)" />
        <div class="time-labels">
          <span id="currentTime">0:00</span>
          <span id="totalDuration">0:00</span>
        </div>
        <div class="controls-row">
          <div style="display:flex;align-items:center;gap:8px;">
            <button id="playBtn" class="play-btn" onclick="togglePlay()">&#9654;</button>
            <button class="stop-btn" onclick="stopAudio()">&#9632;</button>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:10px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;">Speed</span>
            <select id="audioSpeed" class="speed-select" onchange="setPlaybackSpeed(this.value)">
              <option value="0.75">0.75&times;</option>
              <option value="1.0" selected>1.0&times;</option>
              <option value="1.25">1.25&times;</option>
              <option value="1.5">1.5&times;</option>
            </select>
          </div>
        </div>
      </div>

      <div class="notice-box">
        <strong>Note:</strong> In the real IELTS exam, you hear the audio <strong>only once</strong>. Use the speed and scrub controls here to practise &mdash; not to simulate the real test.
      </div>

      <div>
        <div style="display:flex; gap:16px; align-items:center;">
          <button onclick="toggleScratchpad()" style="font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:700;padding:0;font-family:'Inter',sans-serif;">&#9998; Scratchpad</button>
          <button id="toggleTranscriptBtn" onclick="toggleTranscriptDuringTest()" style="font-size:11px;color:var(--accent);background:none;border:none;cursor:pointer;font-weight:700;padding:0;font-family:'Inter',sans-serif;">🔍 Show Transcript</button>
        </div>
        <div id="scratchpad" style="display:none;margin-top:8px;background:var(--paper);border:1px solid var(--rule);border-radius:10px;padding:10px;">
          <textarea id="scratchpadText" oninput="saveScratchpad()" placeholder="Write notes, spellings, guesses..." style="width:100%;height:70px;border:1px solid var(--rule);border-radius:7px;padding:7px;font-size:12px;resize:none;background:#faf8f2;color:var(--ink-soft);outline:none;font-family:'Inter',sans-serif;"></textarea>
        </div>
      </div>

      <div id="transcriptBox" class="transcript-box" style="display:none;">
        <strong style="font-size:11px;color:var(--ink);display:block;margin-bottom:6px;font-family:'Inter',sans-serif;">Tape Script</strong>
        <div id="transcriptContent"></div>
      </div>
    </div>

    <!-- RIGHT: Questions Panel -->
    <div class="questions-panel" id="questionsPanel">
      <div class="paper-sheet">
        <div class="part-heading" id="partHeading">Part 1</div>
        <div id="questionsContainer"></div>
      </div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <footer class="bottom-nav">
    <div class="q-tray" id="bottomNavTray"></div>
    <div class="nav-btns">
      <button class="nav-arrow" onclick="navigateQuestion(-1)">&larr; Prev</button>
      <button class="nav-arrow" onclick="navigateQuestion(1)">Next &rarr;</button>
    </div>
  </footer>

  <script src="test-data.js"></script>
  <script src="unique-test-data.js"></script>
  <script>
    function formatTestId(id) {
      var n = parseInt(id, 10);
      return isNaN(n) ? id : (n < 10 ? '0' + n : String(n));
    }

    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get('test') || '1';
    const testData = IELTS_TEST_DATA[testId];
    if (!testData) { alert('Test not found! Redirecting to Test 1.'); window.location.search = '?test=1'; }

    const currentTestMode = localStorage.getItem('vietest_practice_mode') || 'exam';
    let currentSectionIdx = 0;
    let currentQuestionNum = 1;
    let userAnswers = {};
    let flaggedQuestions = {};
    let timeRemaining = 30 * 60;
    let timerInterval;

    const audio = document.getElementById('mainAudio');
    const playBtn = document.getElementById('playBtn');
    const timeline = document.getElementById('audioTimeline');

    let reviewTimerInterval;
    let isReviewMode = false;

    function checkAnswerCorrect(uAns, cAns) {
      uAns = (uAns || '').trim().toLowerCase();
      cAns = (cAns || '').trim().toLowerCase();
      if (!uAns || !cAns) return false;
      if (uAns === cAns) return true;

      function normalize(str) {
        str = str.replace(/^(a|an|the)\s+/i, '').replace(/[^a-z0-9\s]/g, '').trim();
        return str;
      }

      const uNorm = normalize(uAns);
      const cNorm = normalize(cAns);
      if (uNorm === cNorm) return true;

      function getSingulars(str) {
        const res = [str];
        if (str.endsWith('ies') && str.length > 3) {
          res.push(str.slice(0, -3) + 'y');
        }
        if (str.endsWith('es') && str.length > 2) {
          res.push(str.slice(0, -2));
          res.push(str.slice(0, -1));
        }
        if (str.endsWith('s') && !str.endsWith('ss') && str.length > 1) {
          res.push(str.slice(0, -1));
        }
        return res;
      }

      const uSings = getSingulars(uNorm);
      const cSings = getSingulars(cNorm);

      for (let u of uSings) {
        for (let c of cSings) {
          if (u === c && u.length > 2) return true;
        }
      }
      return false;
    }
    function initTest() {
      document.getElementById('testTitle').textContent = testData.title;
      document.getElementById('testSetTag').textContent = 'IELTS Academic — Test ' + formatTestId(testId);
      document.getElementById('modeIndicator').textContent = 'Mode: ' + (currentTestMode === 'exam' ? 'Exam' : 'Practice');

      if (currentTestMode === 'practice') {
        timeRemaining = 0;
        document.getElementById('timerText').textContent = '00:00';
        timerInterval = setInterval(function() { timeRemaining++; updateTimerDisplay(true); }, 1000);
      } else {
        updateTimerDisplay(false);
        timerInterval = setInterval(function() {
          timeRemaining--;
          updateTimerDisplay(false);
          if (timeRemaining <= 0) { clearInterval(timerInterval); alert('Time is up!'); submitTest(true); }
        }, 1000);

        // Hide controls in Exam Mode
        document.getElementById('audioTimeline').style.display = 'none';
        document.querySelector('.stop-btn').style.display = 'none';
        document.getElementById('audioSpeed').parentElement.style.display = 'none';
        document.querySelector('.notice-box').style.display = 'none';

        var card = document.querySelector('.audio-card');
        var banner = document.createElement('div');
        banner.style.cssText = 'font-size:11px; color:#c62828; background:#ffebee; border:1px solid #ffcdd2; padding:8px; border-radius:6px; margin-top:10px; font-weight:700; text-align:center;';
        banner.textContent = 'Exam Mode Locked: Audio plays once. Scrubber & speed controls disabled.';
        card.appendChild(banner);
      }

      var tabTray = document.getElementById('sectionTabs');
      tabTray.innerHTML = '';
      testData.listening.sections.forEach(function(sec, idx) {
        var btn = document.createElement('button');
        btn.className = 'section-tab' + (idx === 0 ? ' active' : '');
        btn.textContent = 'Part ' + (idx + 1);
        btn.onclick = function() { switchSection(idx, btn); };
        tabTray.appendChild(btn);
      });

      document.getElementById('scratchpadText').value = localStorage.getItem('scratchpad_listening_' + testId) || '';
      loadSection();

      if (urlParams.get('review') === '1' || urlParams.get('review') === 'true') {
        clearInterval(timerInterval);
        isReviewMode = true;
        userAnswers = JSON.parse(localStorage.getItem('answers_test_' + testId + '_listening') || '{}');
        renderReviewMode();
        switchSection(0, document.querySelectorAll('.section-tab')[0]);
      }
    }

    function updateTimerDisplay(countUp) {
      var m = Math.floor(Math.abs(timeRemaining) / 60);
      var s = Math.abs(timeRemaining) % 60;
      var timerDisplay = document.getElementById('timerText');
      var timerPill = timerDisplay.parentElement;
      timerDisplay.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');

      if (!countUp) {
        if (timeRemaining <= 300) {
          timerPill.className = 'timer-pill timer-flash';
          timerPill.style.backgroundColor = '';
          timerPill.style.borderColor = '';
          timerPill.style.color = '';
        } else if (timeRemaining <= 600) {
          timerPill.className = 'timer-pill';
          timerPill.style.backgroundColor = '#fff3e0';
          timerPill.style.borderColor = '#ffe0b2';
          timerPill.style.color = '#e65100';
          timerDisplay.style.color = '#e65100';
        } else {
          timerPill.className = 'timer-pill';
          timerPill.style.backgroundColor = '';
          timerPill.style.borderColor = '';
          timerPill.style.color = '';
          timerDisplay.style.color = '';
        }
      }
    }

    function switchSection(idx, btnEl) {
      currentSectionIdx = idx;
      document.querySelectorAll('.section-tab').forEach(function(b) { b.classList.remove('active'); });
      if (btnEl) btnEl.classList.add('active');
      if (isReviewMode) {
        var transContent = document.getElementById('transcriptContent');
        if (transContent) {
          var chosenSec = testData.listening.sections[idx];
          transContent.innerHTML = chosenSec.transcript || '<em>Transcript unavailable for this section.</em>';
        }
        var headerEl = document.getElementById('review-part-header-' + idx);
        if (headerEl) {
          headerEl.scrollIntoView({ behavior: 'smooth' });
        }
        return;
      }
      loadSection();
      setTimeout(function() {
        var t = document.getElementById('qcard-' + currentQuestionNum);
        if (t) t.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }

    function loadSection() {
      var section = testData.listening.sections[currentSectionIdx];
      document.getElementById('sectionTitle').textContent = section.title;
      document.getElementById('sectionSubLabel').textContent = 'Part ' + (currentSectionIdx + 1);
      document.getElementById('partHeading').textContent = section.title;
      audio.src = section.audio;
      audio.load();
      stopAudio();
      renderQuestions();

      // If transcript is currently visible, update it for the new section
      if (document.getElementById('transcriptBox').style.display !== 'none') {
        document.getElementById('transcriptContent').innerHTML = section.transcript || '<em>Transcript unavailable for this section.</em>';
      }
    }

    audio.addEventListener('timeupdate', function() {
      if (audio.duration) {
        timeline.value = (audio.currentTime / audio.duration) * 100;
        var fmt = function(t) { return Math.floor(t/60) + ':' + String(Math.floor(t%60)).padStart(2,'0'); };
        document.getElementById('currentTime').textContent = fmt(audio.currentTime);
        document.getElementById('totalDuration').textContent = fmt(audio.duration);
      }
    });

    function startListeningReviewPeriod() {
      audio.pause();
      const overlay = document.createElement('div');
      overlay.id = 'listening-review-overlay';
      overlay.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.55); backdrop-filter:blur(3px); z-index:2000; display:flex; align-items:center; justify-content:center;';
      
      let reviewTimeLeft = 120; // 2 minutes
      overlay.innerHTML = `
        <div style="background:var(--paper); border:2px solid var(--accent); border-radius:12px; padding:30px; max-width:480px; width:90%; text-align:center; box-shadow:0 10px 25px rgba(0,0,0,0.25);">
          <h2 style="font-family:\'Fraunces\', serif; font-size:24px; color:var(--accent); margin-top:0;">Listening Review Time</h2>
          <p style="font-size:14px; color:var(--ink-soft); line-height:1.6; margin-bottom:20px;">
            The audio playback has finished. You now have <strong>2 minutes</strong> to review and finalize your answers before the Listening test is automatically submitted.
          </p>
          <div id="review-countdown-clock" style="font-family:\'JetBrains Mono\', monospace; font-size:36px; font-weight:800; color:var(--gold); margin-bottom:25px;">02:00</div>
          <button onclick="submitTest(true)" class="submit-btn" style="width:100%; padding:12px; font-size:14px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer;">Submit Test Now</button>
        </div>
      `;
      document.body.appendChild(overlay);
      
      const clock = document.getElementById('review-countdown-clock');
      reviewTimerInterval = setInterval(function() {
        reviewTimeLeft--;
        const m = Math.floor(reviewTimeLeft / 60);
        const s = reviewTimeLeft % 60;
        clock.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        
        if (reviewTimeLeft <= 0) {
          clearInterval(reviewTimerInterval);
          document.body.removeChild(overlay);
          alert('Review period has ended. Submitting test.');
          submitTest(true);
        }
      }, 1000);
    }

    audio.addEventListener('ended', function() {
      playBtn.innerHTML = '&#9654;';
      if (currentSectionIdx < testData.listening.sections.length - 1) {
        setTimeout(function() {
          var nextIdx = currentSectionIdx + 1;
          var tabBtn = document.querySelectorAll('.section-tab')[nextIdx];
          if (tabBtn) {
            var nextSec = testData.listening.sections[nextIdx];
            if (nextSec.questions && nextSec.questions.length > 0) {
              currentQuestionNum = nextSec.questions[0].num;
            }
            switchSection(nextIdx, tabBtn);
            togglePlay();
          }
        }, 1500);
      } else {
        if (currentTestMode === 'exam') {
          startListeningReviewPeriod();
        }
      }
    });

    function togglePlay() {
      if (audio.paused) { audio.play(); playBtn.innerHTML = '&#10074;&#10074;'; }
      else { audio.pause(); playBtn.innerHTML = '&#9654;'; }
    }
    function stopAudio() {
      audio.pause(); audio.currentTime = 0; playBtn.innerHTML = '&#9654;';
      timeline.value = 0; document.getElementById('currentTime').textContent = '0:00';
    }
    function seekAudio(pct) { if (audio.duration) audio.currentTime = (pct / 100) * audio.duration; }
    function setPlaybackSpeed(s) { audio.playbackRate = parseFloat(s); }

    // MCQ_MULTI checkbox handler for Listening
    function handleMultiSelect(nums, maxCount, checkbox) {
      const checkedBoxes = Array.from(document.querySelectorAll(`input[name="group-${nums[0]}"]:checked`));
      if (checkedBoxes.length > maxCount) {
        checkbox.checked = false;
        alert(`You can only select up to ${maxCount} options for this question.`);
        return;
      }
      
      nums.forEach((n, idx) => {
        userAnswers[n] = checkedBoxes[idx] ? checkedBoxes[idx].value : '';
        document.querySelectorAll('.q-nav-btn').forEach(btn => {
          if (parseInt(btn.textContent) === n) {
            if (userAnswers[n]) btn.classList.add('answered'); else btn.classList.remove('answered');
          }
        });
      });
      renderQuestions();
    }

    // MCQ_MULTI practice check handler for Listening
    function checkPracticeAnswerGroup(nums, idx) {
      var section = testData.listening.sections[currentSectionIdx];
      var allCorrect = true;
      var feedbackTexts = [];
      nums.forEach(function(n) {
        var q = section.questions.find(function(x) { return x.num === n; });
        if (!q) return;
        var uAns = (userAnswers[n] || '').trim().toLowerCase();
        var cAns = q.answer.trim().toLowerCase();
        if (!checkAnswerCorrect(uAns, cAns)) allCorrect = false;
        feedbackTexts.push('Question ' + n + ': Answer is <strong>' + q.answer + '</strong>. ' + q.explanation);
      });
      var fd = document.getElementById('pract-feedback-' + nums[0]);
      if (!fd) return;
      if (allCorrect) {
        fd.className = 'feedback-correct';
        fd.innerHTML = '<strong>Correct!</strong><br>' + feedbackTexts.join('<br>');
      } else {
        fd.className = 'feedback-wrong';
        fd.innerHTML = '<strong>Incorrect</strong><br>' + feedbackTexts.join('<br>');
      }
    }

    function renderQuestions() {
      var section = testData.listening.sections[currentSectionIdx];
      var container = document.getElementById('questionsContainer');
      container.innerHTML = '';

      // ── PRE-PROCESS MCQ_MULTI GROUPS and FILL_GROUP ──
      var rawQuestions = section.questions;
      var displayQuestions = [];
      var fillGroupAbsorbed = {};
      var i = 0;
      while (i < rawQuestions.length) {
        var q = rawQuestions[i];

        // FILL_GROUP: Group consecutive FILL questions sharing the same instruction so they render in a unified layout
        if (q.type === 'FILL') {
          var matchInst = q.instruction || '';
          var group = [q];
          var j = i + 1;
          while (j < rawQuestions.length && rawQuestions[j].type === 'FILL' && (rawQuestions[j].instruction || '') === matchInst) {
            group.push(rawQuestions[j]);
            j++;
          }
          group.forEach(function(gq) { fillGroupAbsorbed[gq.num] = true; });
          displayQuestions.push({
            isFillGroup: true,
            questions: group,
            instruction: matchInst,
            num: group[0].num,
            numEnd: group[group.length - 1].num,
            type: 'FILL_GROUP'
          });
          i = j;
          continue;
        }

        var isChooseMulti = q.instruction && 
          (q.instruction.toLowerCase().includes('choose two') || q.instruction.toLowerCase().includes('choose three'));
        
        if (isChooseMulti && q.type === 'MCQ') {
          var matchText = q.instruction;
          var group = [q];
          var j = i + 1;
          while (j < rawQuestions.length && rawQuestions[j].instruction === matchText && rawQuestions[j].type === 'MCQ') {
            group.push(rawQuestions[j]);
            j++;
          }
          if (group.length > 1) {
            var selectCount = matchText.toLowerCase().includes('choose three') ? 3 : 2;
            displayQuestions.push({
              isGroup: true,
              questions: group,
              selectCount: selectCount,
              instruction: q.instruction,
              num: q.num,
              numEnd: group[group.length - 1].num,
              options: q.options,
              type: 'MCQ_MULTI'
            });
            i = j;
            continue;
          }
        }
        displayQuestions.push(q);
        i++;
      }

      var lastInstruction = null;
      var formPanel = null;
      var matchPanel = null;
      var diagramShown = false;

      displayQuestions.forEach(function(q, idx) {
        if (q.type === 'FILL_GROUP') {
          var hasFlagged = q.questions.some(function(gq) { return flaggedQuestions[gq.num]; });

          if (section.diagram && !diagramShown) {
            var instLower = (q.instruction || '').toLowerCase();
            if (instLower.includes('map') || instLower.includes('plan') || instLower.includes('diagram') || instLower.includes('label the')) {
              var diagramDiv = document.createElement('div');
              diagramDiv.className = 'diagram-panel';
              diagramDiv.innerHTML = section.diagram;
              container.appendChild(diagramDiv);
              diagramShown = true;
            }
          }

          var card = document.createElement('div');
          card.className = 'fill-group-card' + (hasFlagged ? ' has-flagged' : '');
          card.id = 'qcard-' + q.num;

          // Strip the preamble lines (Questions N-M / Complete the ... / Choose ONE WORD...)
          // while leaving the structured HTML notes/tables completely untouched.
          var bodyHtml = q.instruction;
          bodyHtml = bodyHtml.replace(/^(?:questions?\s+\d+(?:\s*-\s*\d+)?)/i, '');
          bodyHtml = bodyHtml.replace(/^(?:\s*<br\s*\/?>\s*)*Complete\s+the\s+[\s\S]+?below\.?/i, '');
          bodyHtml = bodyHtml.replace(/^(?:\s*<br\s*\/?>\s*)*Write\s+[^<]+for\s+(?:each\s+)?answer\.?/i, '');
          bodyHtml = bodyHtml.replace(/^(?:\s*<br\s*\/?>|\s)+/i, '');

          // Check if instruction actually contains structured notes/table placeholders.
          var replaceRegex = /(?:<b>|<strong>)?[\(\[\{]?(\d+)[\)\]\}]?(?:<\/b>|<\/strong>)?\s*(?:<b>|<strong>)?[\._]{3,}(?:<\/b>|<\/strong>)?/g;
          var hasPlaceholders = replaceRegex.test(bodyHtml);

          if (!hasPlaceholders) {
            // Build a structured notes block dynamically using the question texts!
            var dynamicHtml = '<div class="border border-slate-200 rounded-xl p-4 bg-slate-50 space-y-2 text-slate-700 text-xs">';
            dynamicHtml += '<ul class="list-disc pl-4 space-y-1.5">';
            q.questions.forEach(function(gq) {
              var text = gq.text;
              var placeholder = '<strong>[' + gq.num + ']</strong> _________';
              if (/________+/g.test(text)) {
                text = text.replace(/________+/g, placeholder);
              } else {
                text = text + ' ' + placeholder;
              }
              dynamicHtml += '<li>' + text + '</li>';
            });
            dynamicHtml += '</ul></div>';
            bodyHtml = dynamicHtml;
          }

          // Replace each placeholder with an inline input widget.
          replaceRegex.lastIndex = 0;
          bodyHtml = bodyHtml.replace(replaceRegex, function(match, numStr) {
            var qNum = parseInt(numStr, 10);
            var gq = q.questions.find(function(x) { return x.num === qNum; });
            if (!gq) return match;
            var val = escapeHtml(userAnswers[qNum] || '');
            var isFlagged = !!flaggedQuestions[qNum];
            return '<span class="inline-fill-wrap" id="qcard-anchor-' + qNum + '">' +
              '<span class="inline-q-num">' + qNum + '</span>' +
              '<input type="text" class="inline-fill" value="' + val + '" ' +
                'oninput="handleInput(' + qNum + ', this.value)" ' +
                'placeholder="..." />' +
              '<label class="inline-flag-label" title="Mark for review">' +
                '<input type="checkbox" onchange="toggleFlag(' + qNum + ')" ' +
                  (isFlagged ? 'checked' : '') + ' />' +
                ' Review' +
              '</label>' +
            '</span>';
          });

          // Build header row showing range (Q first – last) and correct task type
          var rangeLabel = q.num === q.numEnd ? q.num : (q.num + ' – ' + q.numEnd);
          var taskName = 'Notes Completion';
          var lowerInst = (q.instruction || '').toLowerCase();
          if (lowerInst.includes('table')) taskName = 'Table Completion';
          else if (lowerInst.includes('form')) taskName = 'Form Completion';
          else if (lowerInst.includes('flow-chart') || lowerInst.includes('flow chart')) taskName = 'Flow-chart Completion';
          else if (lowerInst.includes('summary')) taskName = 'Summary Completion';

          var optionsHtml = '';
          var firstQWithOptions = q.questions.find(function(x) { return x.options && x.options.length > 0; });
          if (firstQWithOptions) {
            optionsHtml = 
              '<div class="options-box" style="margin: 15px 0 15px 0; padding: 12px 16px; border: 1.5px solid var(--rule); border-radius: 8px; background: #fbfaf7; font-family: \'Inter\', sans-serif;">' +
                '<div style="font-size: 11px; font-weight: 700; color: var(--ink-soft); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; font-family: \'Inter\', sans-serif;">Options Box:</div>' +
                '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px;">' +
                  firstQWithOptions.options.map(function(opt) {
                    return '<div style="font-size: 13px; color: var(--ink); padding: 5px 10px; background: var(--paper); border: 1.5px solid var(--rule-soft); border-radius: 6px; font-weight: 600; font-family: \'Lora\', serif;">' +
                      opt +
                    '</div>';
                  }).join('') +
                '</div>' +
              '</div>';
          }

          card.innerHTML = 
            '<div class="q-header" style="margin-bottom:12px;">' +
              '<span class="q-num-badge" style="border-radius:12px;padding:2px 8px;width:auto;height:auto;min-width:24px;">' + rangeLabel + '</span>' +
              '<span style="font-size:11px;color:#9c9385;font-weight:600;">' + taskName + '</span>' +
            '</div>' +
            optionsHtml +
            '<div class="fill-group-body">' + bodyHtml + '</div>';

          // Practice mode: Check All button + combined feedback
          if (currentTestMode === 'practice') {
            var nums = q.questions.map(function(x) { return x.num; });
            var footer = document.createElement('div');
            footer.className = 'fill-group-footer';
            footer.innerHTML = 
              '<button onclick="checkFillGroup(' + JSON.stringify(nums) + ', \'' + q.num + '\')" class="check-btn">Check Answers</button>';
            card.appendChild(footer);
            var fb = document.createElement('div');
            fb.id = 'pract-feedback-' + q.num;
            card.appendChild(fb);
          }

          container.appendChild(card);
          // Set up anchors for each sub-question so bottom nav scroll works
          q.questions.forEach(function(gq) {
            if (gq.num !== q.num) {
              var sentinel = document.createElement('div');
              sentinel.id = 'qcard-' + gq.num;
              sentinel.style.cssText = 'position:absolute;pointer-events:none;height:0;overflow:hidden;';
              card.appendChild(sentinel);
            }
          });
          return;
        }

        if (q.instruction && q.instruction.trim()) {
          if (q.instruction !== lastInstruction) {
            var banner = document.createElement('div');
            banner.className = 'instruction-banner';
            banner.innerHTML = q.instruction;
            container.appendChild(banner);
            lastInstruction = q.instruction;
            formPanel = null;
            matchPanel = null;

            if (section.diagram && !diagramShown) {
              var instLower = q.instruction.toLowerCase();
              if (instLower.includes('map') || instLower.includes('plan') || instLower.includes('diagram') || instLower.includes('label the')) {
                var diagramDiv = document.createElement('div');
                diagramDiv.className = 'diagram-panel';
                diagramDiv.innerHTML = section.diagram;
                container.appendChild(diagramDiv);
                diagramShown = true;
              }
            }
          }
        } else {
          lastInstruction = null;
          formPanel = null;
          matchPanel = null;
        }

        if (q.type === 'MATCHING' && !q.contentUnavailable) {
          if (!matchPanel) {
            matchPanel = document.createElement('div');
            matchPanel.className = 'form-panel';
            container.appendChild(matchPanel);
          }

          var mRow = document.createElement('div');
          mRow.className = 'matching-row' + (flaggedQuestions[q.num] ? ' flagged' : '');
          mRow.id = 'qcard-' + q.num;

          var selectedLetter = userAnswers[q.num] || '';
          var labelDiv = document.createElement('div');
          labelDiv.className = 'matching-row-label';
          labelDiv.innerHTML = '<span class="form-row-num">' + q.num + '</span><span class="matching-row-body">' + q.text + '</span>';
          mRow.appendChild(labelDiv);

          var lettersDiv = document.createElement('div');
          lettersDiv.className = 'letter-choice-row';
          q.options.forEach(function(letter) {
            var btn = document.createElement('button');
            btn.className = 'letter-btn' + (selectedLetter === letter ? ' selected' : '');
            btn.textContent = letter;
            btn.onclick = function() { selectOption(q.num, letter); };
            lettersDiv.appendChild(btn);
          });
          mRow.appendChild(lettersDiv);

          matchPanel.appendChild(mRow);

          if (currentTestMode === 'practice') {
            var mPractRow = document.createElement('div');
            mPractRow.style.cssText = 'padding:0 16px 11px;display:flex;justify-content:flex-end;';
            mPractRow.innerHTML = '<button class="check-btn" onclick="checkPracticeAnswer(' + q.num + ', ' + idx + ')">Check Answer</button>';
            matchPanel.appendChild(mPractRow);
            var mFeedback = document.createElement('div');
            mFeedback.id = 'pract-feedback-' + q.num;
            mFeedback.style.cssText = 'padding:0 16px 11px;';
            matchPanel.appendChild(mFeedback);
          }
          return;
        }

        matchPanel = null;

        if (q.type === 'FILL' && !q.contentUnavailable) {
          if (!formPanel) {
            formPanel = document.createElement('div');
            formPanel.className = 'form-panel';
            container.appendChild(formPanel);
          }

          var row = document.createElement('div');
          row.className = 'form-row' + (flaggedQuestions[q.num] ? ' flagged' : '') + (userAnswers[q.num] ? ' answered' : '');
          row.id = 'qcard-' + q.num;

          var val = (userAnswers[q.num] || '').replace(/"/g, '&quot;');
          var inputHtml = '<input type="text" class="q-blank-input" oninput="handleInput(' + q.num + ', this.value)" value="' + val + '" placeholder="(' + q.num + ')" id="input-' + q.num + '" />';
          var textWithInput = q.text.replace(/________+/g, inputHtml);
          if (textWithInput === q.text) textWithInput = q.text + ' ' + inputHtml;

          var main = document.createElement('div');
          main.className = 'form-row-main';
          main.innerHTML = '<span class="form-row-num">' + q.num + '</span>' +
            '<span class="form-row-body">' + textWithInput + '</span>' +
            '<label class="q-review-label form-row-review"><input type="checkbox" onchange="toggleFlag(' + q.num + ')" ' + (flaggedQuestions[q.num] ? 'checked' : '') + ' /> Review</label>';
          row.appendChild(main);

          if (currentTestMode === 'practice') {
            var practRow = document.createElement('div');
            practRow.className = 'form-row-practice';
            practRow.id = 'pract-actions-' + q.num;
            practRow.innerHTML = '<button class="check-btn" onclick="checkPracticeAnswer(' + q.num + ', ' + idx + ')">Check Answer</button>';
            row.appendChild(practRow);
            var feedbackDiv = document.createElement('div');
            feedbackDiv.id = 'pract-feedback-' + q.num;
            feedbackDiv.style.marginLeft = '34px';
            row.appendChild(feedbackDiv);
          }

          formPanel.appendChild(row);
          return;
        }

        formPanel = null;

        var card = document.createElement('div');
        var isCardFlagged = false;
        var isCardAnswered = false;
        
        if (q.isGroup) {
          isCardFlagged = q.questions.some(function(x) { return flaggedQuestions[x.num]; });
          isCardAnswered = q.questions.some(function(x) { return userAnswers[x.num]; });
        } else {
          isCardFlagged = flaggedQuestions[q.num];
          isCardAnswered = userAnswers[q.num];
        }

        card.className = 'q-card' + (isCardFlagged ? ' flagged' : '') + (isCardAnswered ? ' answered' : '') + (q.contentUnavailable ? ' unavailable' : '');
        card.id = 'qcard-' + q.num;

        var header = document.createElement('div');
        header.className = 'q-header';
        var displayNumStr = q.isGroup ? (q.num + ' – ' + q.numEnd) : q.num;
        var taskName = '';
        if (q.type === 'MCQ') taskName = 'Multiple Choice';
        else if (q.type === 'MCQ_MULTI') taskName = 'Multiple Choice';
        else if (q.type === 'FILL') taskName = 'Short Answer';
        else if (q.type === 'MATCHING') taskName = 'Matching';

        header.innerHTML = 
          '<div style="display:flex; align-items:center; gap:8px;">' +
            '<span class="q-num-badge" style="border-radius:12px; padding:2px 8px; width:auto; height:auto; min-width:24px;">' + displayNumStr + '</span>' +
            (taskName ? '<span style="font-size:11px; color:#9c9385; font-weight:600; text-transform:uppercase; font-family:\'Inter\'; margin-left:6px;">' + taskName + '</span>' : '') +
          '</div>' +
          (q.contentUnavailable ? '' : '<label class="q-review-label"><input type="checkbox" onchange="toggleFlag(' + q.num + ')" ' + (flaggedQuestions[q.num] ? 'checked' : '') + ' /> Review</label>');
        card.appendChild(header);

        var body = document.createElement('div');
        if (q.contentUnavailable) {
          body.className = 'q-unavailable-note';
          body.innerHTML = 'This question\'s source text could not be recovered during data restoration, so it is excluded from scoring. It will not count for or against your band score.';
          card.appendChild(body);
          container.appendChild(card);
          return;
        }

        body.className = 'q-body';

        if (q.type === 'MCQ') {
          body.innerHTML = '<div style="margin-bottom:9px;">' + q.text + '</div>';
          var optionsDiv = document.createElement('div');
          optionsDiv.className = 'mcq-options';
          var selected = userAnswers[q.num] || '';
          q.options.forEach(function(opt) {
            var dotIdx = opt.indexOf('.');
            var letter = dotIdx !== -1 ? opt.slice(0, dotIdx).trim() : opt.trim();
            var text = dotIdx !== -1 ? opt.slice(dotIdx + 1).trim() : '';
            var optEl = document.createElement('div');
            optEl.className = 'mcq-option' + (selected === letter ? ' selected' : '');
            optEl.innerHTML = '<span class="opt-letter">' + letter + '.</span><span>' + text + '</span>';
            optEl.onclick = function() { selectOption(q.num, letter); };
            optionsDiv.appendChild(optEl);
          });
          body.appendChild(optionsDiv);
        } else if (q.type === 'MCQ_MULTI') {
          var questionText = q.questions && q.questions[0] ? q.questions[0].text : (q.text || '');
          questionText = questionText.replace(/\s*\(\s*Select\s+[^)]+\)/i, '');
          body.innerHTML = '<div style="font-weight: 600; margin-bottom: 8px; font-family: \'Lora\', serif; font-size: 15px; color: var(--ink);">' + questionText + '</div>' +
                           '<div style="margin-bottom:12px; font-size: 13px; color: var(--ink-soft); font-family: \'Inter\', sans-serif;">Choose <strong>' + q.selectCount + '</strong> letters, A-E.</div>';
          var optionsDiv = document.createElement('div');
          optionsDiv.className = 'mcq-options';
          var nums = q.questions.map(function(x) { return x.num; });
          var currentAnswers = nums.map(function(n) { return userAnswers[n]; }).filter(Boolean);
          q.options.forEach(function(opt) {
            var dotIdx = opt.indexOf('.');
            var letter = dotIdx !== -1 ? opt.slice(0, dotIdx).trim() : opt.trim();
            var text = dotIdx !== -1 ? opt.slice(dotIdx + 1).trim() : '';
            var isChecked = currentAnswers.includes(letter);
            var optEl = document.createElement('label');
            optEl.className = 'mcq-option' + (isChecked ? ' selected' : '');
            optEl.style.cssText = 'display:flex; align-items:center; gap:10px; cursor:pointer;';
            optEl.innerHTML = '<input type="checkbox" name="group-' + q.num + '" value="' + letter + '" ' + (isChecked ? 'checked' : '') + ' style="accent-color:var(--accent); width:16px; height:16px;" />' +
              '<span class="opt-letter" style="margin-left:5px;">' + letter + '.</span><span>' + text + '</span>';
            optEl.querySelector('input').onchange = function() { handleMultiSelect(nums, q.selectCount, this); };
            optionsDiv.appendChild(optEl);
          });
          body.appendChild(optionsDiv);
        }
        card.appendChild(body);

        if (currentTestMode === 'practice') {
          var practRow = document.createElement('div');
          practRow.style.cssText = 'display:flex;justify-content:flex-end;border-top:1px solid var(--rule-soft);margin-top:12px;padding-top:10px;';
          practRow.id = 'pract-actions-' + q.num;
          
          var buttonHtml = q.isGroup 
            ? '<button class="check-btn" onclick="checkPracticeAnswerGroup(' + JSON.stringify(q.questions.map(function(x){return x.num;})) + ', ' + idx + ')">Check Answers</button>'
            : '<button class="check-btn" onclick="checkPracticeAnswer(' + q.num + ', ' + idx + ')">Check Answer</button>';
          
          practRow.innerHTML = buttonHtml;
          card.appendChild(practRow);
          var feedbackDiv = document.createElement('div');
          feedbackDiv.id = 'pract-feedback-' + q.num;
          card.appendChild(feedbackDiv);
        }

        container.appendChild(card);
      });

      if (section.diagram && !diagramShown) {
        var diagramDiv = document.createElement('div');
        diagramDiv.className = 'diagram-panel';
        diagramDiv.innerHTML = section.diagram;
        container.insertBefore(diagramDiv, container.firstChild);
      }

      renderBottomTray();
    }

    function renderBottomTray() {
      var tray = document.getElementById('bottomNavTray');
      tray.innerHTML = '';
      testData.listening.sections.forEach(function(sec, sIdx) {
        sec.questions.forEach(function(q) {
          var btn = document.createElement('button');
          btn.className = 'q-nav-btn' + (userAnswers[q.num] ? ' answered' : '') + (flaggedQuestions[q.num] ? ' flagged' : '') + (q.num === currentQuestionNum ? ' current' : '');
          btn.textContent = q.num;
          btn.onclick = function() {
            currentQuestionNum = q.num;
            if (sIdx !== currentSectionIdx) {
              var tabBtn = document.querySelectorAll('.section-tab')[sIdx];
              switchSection(sIdx, tabBtn);
            }
            var targetBox = document.getElementById('qcard-' + q.num);
            if (targetBox) targetBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.querySelectorAll('.q-nav-btn').forEach(function(b) {
              b.classList.remove('current');
              if (parseInt(b.textContent) === q.num) b.classList.add('current');
            });
          };
          tray.appendChild(btn);
        });
      });
    }

    function selectOption(qNum, val) {
      userAnswers[qNum] = val;
      renderQuestions();
    }

    function handleInput(qNum, val) {
      userAnswers[qNum] = val;
      document.querySelectorAll('.q-nav-btn').forEach(function(btn) {
        if (parseInt(btn.textContent) === qNum) {
          if (val.trim()) btn.classList.add('answered'); else btn.classList.remove('answered');
        }
      });
      var card = document.getElementById('qcard-' + qNum);
      if (card) { if (val.trim()) card.classList.add('answered'); else card.classList.remove('answered'); }
    }

    function toggleFlag(qNum) {
      flaggedQuestions[qNum] = !flaggedQuestions[qNum];
      renderQuestions();
    }

    function checkPracticeAnswer(qNum, idx) {
      var section = testData.listening.sections[currentSectionIdx];
      var q = section.questions[idx];
      var uAns = (userAnswers[qNum] || '').trim().toLowerCase();
      var cAns = q.answer.trim().toLowerCase();
      var isCorrect = checkAnswerCorrect(uAns, cAns);
      var fd = document.getElementById('pract-feedback-' + qNum);
      if (!fd) return;
      if (isCorrect) {
        fd.className = 'feedback-correct';
        fd.innerHTML = '<strong>Correct!</strong> ' + q.explanation;
      } else {
        fd.className = 'feedback-wrong';
        fd.innerHTML = '<strong>Incorrect</strong><br>Your answer: <span style="text-decoration:line-through;">' + escapeHtml(userAnswers[qNum] || 'None') + '</span><br>Correct: <strong style="color:#245e3f;">' + escapeHtml(q.answer) + '</strong><br><span style="color:#6b6558;display:block;margin-top:4px;">' + q.explanation + '</span>';
      }
    }

    function toggleScratchpad() {
      var sp = document.getElementById('scratchpad');
      sp.style.display = sp.style.display === 'none' ? 'block' : 'none';
    }
    function saveScratchpad() {
      localStorage.setItem('scratchpad_listening_' + testId, document.getElementById('scratchpadText').value);
    }

    function navigateQuestion(dir) {
      var totalQs = 0;
      testData.listening.sections.forEach(function(sec) { totalQs += sec.questions.length; });
      var next = currentQuestionNum + dir;
      if (next < 1 || next > totalQs) return;
      currentQuestionNum = next;
      var targetSectionIdx = -1;
      testData.listening.sections.forEach(function(sec, sIdx) {
        if (sec.questions.some(function(q) { return q.num === currentQuestionNum; })) targetSectionIdx = sIdx;
      });
      if (targetSectionIdx !== -1) {
        if (targetSectionIdx !== currentSectionIdx) {
          var tabBtn = document.querySelectorAll('.section-tab')[targetSectionIdx];
          switchSection(targetSectionIdx, tabBtn);
        } else {
          var t = document.getElementById('qcard-' + currentQuestionNum);
          if (t) t.scrollIntoView({ behavior: 'smooth', block: 'center' });
          document.querySelectorAll('.q-nav-btn').forEach(function(b) {
            b.classList.remove('current');
            if (parseInt(b.textContent) === currentQuestionNum) b.classList.add('current');
          });
        }
      }
    }

    async function submitTest(autoSubmit) {
      if (!autoSubmit) {
        var totalUnanswered = 0, totalAll = 0;
        testData.listening.sections.forEach(function(sec) {
          sec.questions.forEach(function(q) {
            if (q.contentUnavailable) return;
            totalAll++;
            if (!userAnswers[q.num]) totalUnanswered++;
          });
        });
        if (totalUnanswered > 0) {
          if (!confirm('You have ' + totalUnanswered + ' unanswered question' + (totalUnanswered === 1 ? '' : 's') + ' left (out of ' + totalAll + '). Are you sure you want to submit the test?')) {
            return;
          }
        } else {
          if (!confirm('Are you sure you want to submit the test?')) return;
        }
      }
      var overlay = document.getElementById('listening-review-overlay');
      if (overlay) {
        clearInterval(reviewTimerInterval);
        document.body.removeChild(overlay);
      }
      clearInterval(timerInterval);
      audio.pause();
      var correctCount = 0, totalQs = 0;
      var answerReview = [];
      testData.listening.sections.forEach(function(sec) {
        sec.questions.forEach(function(q) {
          if (q.contentUnavailable) return;
          totalQs++;
          var rawAns = (userAnswers[q.num] || '').trim();
          var uAns = rawAns.toLowerCase();
          var cAns = q.answer.trim().toLowerCase();
          var isCorrect = checkAnswerCorrect(uAns, cAns);
          if (isCorrect) correctCount++;
          answerReview.push({ num: q.num, type: q.type || null, userAnswer: rawAns || null, correctAnswer: q.answer, isCorrect: isCorrect });
        });
      });
      var pct = totalQs > 0 ? correctCount / totalQs : 0;
      var band = 4.0;
      if (pct >= 0.95) band = 9.0; else if (pct >= 0.88) band = 8.5;
      else if (pct >= 0.80) band = 8.0; else if (pct >= 0.72) band = 7.5;
      else if (pct >= 0.65) band = 7.0; else if (pct >= 0.58) band = 6.5;
      else if (pct >= 0.50) band = 6.0; else if (pct >= 0.40) band = 5.5;
      else if (pct >= 0.30) band = 5.0;

      localStorage.setItem('score_test_' + testId + '_listening', band.toFixed(1));
      localStorage.setItem('answers_test_' + testId + '_listening', JSON.stringify(userAnswers));

      // Await the save so we can confirm success/failure in the UI
      var activeStudentId = localStorage.getItem('viatestprep_active_student_id');
      var cloudSaved = false;
      if (activeStudentId) {
        try {
          var saveRes = await fetch('/api/mock/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              studentId: activeStudentId,
              testName: testData.title,
              moduleType: 'listening',
              listeningBand: parseFloat(band.toFixed(1)),
              correctCount: correctCount,
              totalQuestions: totalQs,
              answerReview: answerReview
            })
          });
          var saveData = await saveRes.json();
          cloudSaved = !!(saveData && saveData.ok);
        } catch(e) {
          console.error('Could not sync listening result to CRM:', e);
        }
      }

      isReviewMode = true;
      renderReviewMode(band, correctCount, totalQs, cloudSaved, !!activeStudentId);
    }

    function renderReviewMode(band, correctCount, totalQs, cloudSaved, isLoggedIn) {
      document.getElementById('modeIndicator').textContent = 'Mode: Review';
      var sb = document.getElementById('submitBtn'); if (sb) sb.remove();
      var returnBtn = document.createElement('a');
      returnBtn.href = 'index.html';
      returnBtn.style.cssText = 'padding:7px 16px;border-radius:9px;background:#2f7a52;color:#fff;font-size:12px;font-weight:700;text-decoration:none;font-family:"Inter",sans-serif;';
      returnBtn.textContent = 'Return to Lobby';
      document.querySelector('.site-header').appendChild(returnBtn);

      // ── Rich result panel ───────────────────────────────────────────────────
      var audioPanel = document.querySelector('.audio-panel');
      if (audioPanel) {
        var pct = totalQs > 0 ? Math.round((correctCount / totalQs) * 100) : 0;
        var bandColor = band >= 7.0 ? '#2f7a52' : band >= 6.0 ? '#a8792f' : '#7a2331';
        var saveHtml;
        if (isLoggedIn && cloudSaved) {
          saveHtml = '<div style="margin-top:10px;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#2f7a52;"><span>✅</span> Results saved to your profile</div>';
        } else if (isLoggedIn && !cloudSaved) {
          saveHtml = '<div style="margin-top:10px;display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:#a8792f;"><span>⚠️</span> Could not save to cloud — stored locally only</div>';
        } else {
          saveHtml = '<div style="margin-top:10px;font-size:11px;color:#8a8171;">Results saved locally. <a href="index.html" style="color:#7a2331;font-weight:700;text-decoration:underline;">Log in</a> to sync across devices.</div>';
        }
        var resultBanner = document.createElement('div');
        resultBanner.style.cssText = 'background:var(--paper);border:1.5px solid var(--rule);border-radius:14px;padding:16px 18px;margin-bottom:16px;';
        resultBanner.innerHTML =
          '<div style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);margin-bottom:8px;">Listening Result</div>' +
          '<div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px;">' +
            '<span style="font-family:\'Fraunces\',serif;font-size:36px;font-weight:800;line-height:1;color:' + bandColor + ';">' + band.toFixed(1) + '</span>' +
            '<span style="font-size:12px;font-weight:700;color:var(--ink-soft);">Estimated Band</span>' +
          '</div>' +
          '<div style="font-size:12px;color:var(--ink-soft);">' + correctCount + ' / ' + totalQs + ' correct <span style="font-weight:700;color:' + bandColor + ';">(' + pct + '%)</span></div>' +
          saveHtml;
        audioPanel.insertBefore(resultBanner, audioPanel.firstChild);
      }
      // ────────────────────────────────────────────────────────────────────────

      var transBox = document.getElementById('transcriptBox');
      transBox.style.display = 'block';

      var transHeader = document.createElement('div');

      transHeader.style.cssText = 'display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;';
      transHeader.innerHTML = '<span style="font-weight:700; font-family:\'Inter\',sans-serif;">Audio Transcript:</span>';
      
      var select = document.createElement('select');
      select.style.cssText = 'padding:6px 12px; border-radius:6px; border:1.5px solid var(--rule); font-family:\'Inter\',sans-serif; font-size:13px; font-weight:600; cursor:pointer; background:var(--paper); color:var(--ink);';
      testData.listening.sections.forEach(function(sec, sIdx) {
        var opt = document.createElement('option');
        opt.value = sIdx;
        opt.textContent = 'Part ' + (sIdx + 1);
        select.appendChild(opt);
      });
      select.value = currentSectionIdx;
      
      transHeader.appendChild(select);
      transBox.innerHTML = '';
      transBox.appendChild(transHeader);
      
      var transContent = document.createElement('div');
      transContent.id = 'transcriptContent';
      transContent.style.cssText = 'max-height: 250px; overflow-y: auto; padding-right: 8px; font-family:\'Lora\',serif; line-height:1.7;';
      var initialSec = testData.listening.sections[currentSectionIdx];
      transContent.innerHTML = initialSec.transcript || '<em>Transcript unavailable for this section.</em>';
      transBox.appendChild(transContent);

      select.onchange = function() {
        var chosenSec = testData.listening.sections[parseInt(this.value)];
        transContent.innerHTML = chosenSec.transcript || '<em>Transcript unavailable for this section.</em>';
      };

      var container = document.getElementById('questionsContainer');
      container.innerHTML = '';

      testData.listening.sections.forEach(function(sec, sIdx) {
        var secHeader = document.createElement('h2');
        secHeader.id = 'review-part-header-' + sIdx;
        secHeader.style.cssText = 'font-size:18px; font-weight:700; color:var(--accent); margin:28px 0 16px 0; font-family:"Inter",sans-serif; border-bottom: 2px solid var(--rule-soft); padding-bottom: 6px;';
        secHeader.textContent = 'Part ' + (sIdx + 1);
        container.appendChild(secHeader);

        var sDiagramShown = false;
        sec.questions.forEach(function(q) {
          if (sec.diagram && !sDiagramShown) {
            var instLower = (q.instruction || '').toLowerCase();
            if (instLower.includes('map') || instLower.includes('plan') || instLower.includes('diagram') || instLower.includes('label the')) {
              var diagramDiv = document.createElement('div');
              diagramDiv.className = 'diagram-panel';
              diagramDiv.innerHTML = sec.diagram;
              container.appendChild(diagramDiv);
              sDiagramShown = true;
            }
          }

          var card = document.createElement('div');
          card.id = 'qcard-' + q.num;

          if (q.contentUnavailable) {
            card.className = 'review-card excluded';
            card.innerHTML = '<div style="font-size:11px;font-weight:800;text-transform:uppercase;color:#8a8375;margin-bottom:6px;">Question ' + q.num + ' — Excluded from scoring</div>' +
              '<p style="font-size:13px;color:#6b6558;font-family:\'Lora\',serif;font-style:italic;">This question\'s source text could not be recovered and does not count toward your score.</p>';
            container.appendChild(card);
            return;
          }

          var uAns = (userAnswers[q.num] || '').trim();
          var cAns = q.answer.trim();
          var isCorrect = checkAnswerCorrect(uAns, cAns);
          card.className = 'review-card ' + (isCorrect ? 'correct' : 'wrong');
          card.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><span style="font-size:11px;font-weight:800;text-transform:uppercase;color:' + (isCorrect ? '#245e3f' : '#8a2c1f') + ';">' + (isCorrect ? 'Correct' : 'Incorrect') + ' — Question ' + q.num + '</span></div>' +
            '<p style="font-size:14px;font-weight:600;margin:0 0 8px;font-family:\'Lora\',serif;">' + q.text + '</p>' +
            '<div style="font-size:12px;color:var(--ink-soft);"><div>Your answer: <strong style="color:' + (isCorrect ? '#245e3f' : '#8a2c1f') + '">' + escapeHtml(uAns || 'None') + '</strong></div>' +
            (!isCorrect ? '<div style="margin-top:4px;">Correct: <strong style="color:#245e3f;">' + escapeHtml(cAns) + '</strong></div>' : '') + '</div>' +
            '<div style="margin-top:10px;background:var(--paper);border:1px solid var(--rule);border-radius:8px;padding:10px 12px;font-size:12px;color:#6b6558;"><strong style="color:var(--ink);display:block;margin-bottom:4px;">Explanation:</strong>' + q.explanation + '</div>';
          container.appendChild(card);
        });

        if (sec.diagram && !sDiagramShown) {
          var diagramDiv = document.createElement('div');
          diagramDiv.className = 'diagram-panel';
          diagramDiv.innerHTML = sec.diagram;
          container.insertBefore(diagramDiv, secHeader.nextSibling);
        }
      });
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    
    function isFillGroupInstruction(inst) {
      var r = /(?:<b>|<strong>)?\(?(\d+)\)?(?:<\/b>|<\/strong>)?\s*(?:<b>|<strong>)?[\._]{3,}(?:<\/b>|<\/strong>)?/;
      return inst && r.test(inst);
    }

    function checkFillGroup(nums, firstNum) {
      var section = testData.listening.sections[currentSectionIdx];
      var allCorrect = true;
      var feedbackLines = [];

      nums.forEach(function(n) {
        var q = section.questions.find(function(x) { return x.num === n; });
        if (!q) return;
        var uAns = (userAnswers[n] || '').trim().toLowerCase();
        var cAns = q.answer.trim().toLowerCase();
        var correct = checkAnswerCorrect(uAns, cAns);
        if (!correct) allCorrect = false;
        feedbackLines.push(
          '<div style="margin-bottom:4px;">' +
            '<strong>Q' + n + ':</strong> ' +
            (correct
              ? '<span style="color:#245e3f;">✓ Correct — <em>' + escapeHtml(q.answer) + '</em></span>'
              : '<span style="color:#8a2c1f;">✗ Your answer: <s>' + escapeHtml(userAnswers[n] || 'none') + '</s> &rarr; Correct: <strong>' + escapeHtml(q.answer) + '</strong></span>') +
            (q.explanation ? '<br><span style="color:#6b6558;font-size:11px;">' + q.explanation + '</span>' : '') +
          '</div>'
        );
      });

      var fd = document.getElementById('pract-feedback-' + firstNum);
      if (!fd) return;
      fd.style.cssText = 'margin-top:10px; padding:10px 13px; border-radius:8px; border:1px solid ' + (allCorrect ? '#a9d4b8; background:#eef6f0; color:#245e3f;' : '#e3b4ab; background:#faeeec; color:#8a2c1f;');
      fd.innerHTML = '<div style="font-weight:700;margin-bottom:8px;">' + (allCorrect ? '✓ All correct!' : 'Some answers need review') + '</div>' + feedbackLines.join('');
    }

    function toggleTranscriptDuringTest() {
      var transBox = document.getElementById('transcriptBox');
      var btn = document.getElementById('toggleTranscriptBtn');
      var section = testData.listening.sections[currentSectionIdx];
      
      if (transBox.style.display === 'none') {
        document.getElementById('transcriptContent').innerHTML = section.transcript || '<em>Transcript unavailable for this section.</em>';
        transBox.style.display = 'block';
        btn.textContent = '🔍 Hide Transcript';
      } else {
        transBox.style.display = 'none';
        btn.textContent = '🔍 Show Transcript';
      }
    }

    initTest();
  </script>
</body>
</html>
