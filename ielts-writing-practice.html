<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IELTS Writing Test — ViATestPrep</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700;800&family=Fraunces:wght@600;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  :root {
    --paper: #fffefb;
    --page-bg: #eae6dc;
    --ink: #1c1a17;
    --ink-soft: #4a453d;
    --rule: rgba(28, 26, 23, 0.14);
    --rule-soft: rgba(28, 26, 23, 0.08);
    --accent: #7a2331;
    --accent-soft: #f6e9ea;
    --gold: #a8792f;
  }
  body { background: var(--page-bg); color: var(--ink); font-family: "Inter", sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  .site-header { background: var(--paper); border-bottom: 1px solid var(--rule); height: 62px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
  .exit-link { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--rule); font-size: 12px; font-weight: 700; color: var(--ink-soft); text-decoration: none; }
  .exit-link:hover { background: var(--rule-soft); }
  .book-badge { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: .1em; }
  .test-title { font-size: 14px; font-weight: 700; color: var(--ink); font-family: "Fraunces", serif; }
  .mode-tag { font-size: 11px; color: var(--ink-soft); font-weight: 600; }
  .timer-pill { display: flex; align-items: center; gap: 6px; background: var(--accent-soft); border: 1px solid rgba(122,35,49,.18); border-radius: 20px; padding: 5px 14px; }
  .timer-text { font-size: 13px; font-weight: 800; font-family: "JetBrains Mono", monospace; color: var(--accent); }
  .submit-btn { padding: 7px 18px; border-radius: 9px; background: var(--accent); color: #fff; border: none; font-size: 12px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(122,35,49,.25); }
  .submit-btn:hover { background: #5e1a25; }

  .test-container { flex: 1; display: flex; overflow: hidden; }

  .prompt-pane { width: 50%; height: 100%; overflow-y: auto; border-right: 1px solid var(--rule); background: var(--page-bg); padding: 28px 30px; }
  .prompt-sheet { max-width: 560px; margin: 0 auto; background: var(--paper); border: 1px solid var(--rule); border-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 12px 32px rgba(28,26,23,.05); padding: 30px 34px 36px; }

  .task-tabs { display: flex; gap: 6px; border-bottom: 1px solid var(--rule); padding-bottom: 12px; margin-bottom: 20px; }
  .task-tab { padding: 6px 14px; border-radius: 7px; font-size: 11.5px; font-weight: 700; cursor: pointer; border: 1px solid var(--rule); color: var(--ink-soft); background: var(--paper); transition: all .18s; }
  .task-tab:hover { background: var(--rule-soft); }
  .task-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .task-title { font-family: "Fraunces", serif; font-size: 20px; font-weight: 800; color: var(--ink); margin: 0 0 14px; border-bottom: 2px solid var(--ink); padding-bottom: 10px; }
  .info-banner { padding: 9px 13px; background: #f6f1e4; border: 1px solid rgba(168,121,47,.25); border-radius: 9px; font-size: 11.5px; color: #4a4530; display: flex; justify-content: space-between; margin-bottom: 16px; }
  .prompt-text { padding: 16px 18px; border-radius: 10px; border: 1px solid var(--rule); background: #faf8f2; font-family: "Lora", serif; font-size: 14px; line-height: 1.8; color: var(--ink-soft); }
  .prompt-text .prompt-kicker { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); font-family: "Inter", sans-serif; display: block; margin-bottom: 8px; }
  .prompt-text .prompt-statement { font-size: 15px; font-weight: 600; color: var(--ink); border-left: 3px solid var(--accent); padding-left: 12px; margin: 10px 0; }
  .prompt-text .prompt-note { font-size: 12.5px; color: var(--ink-soft); margin-top: 10px; }
  .prompt-text .prompt-req { font-size: 12px; font-weight: 700; color: var(--ink); margin-top: 12px; }

  #graphContainer { margin-top: 18px; padding: 18px; border-radius: 10px; border: 1px solid var(--rule); background: var(--paper); text-align: center; }
  #graphicImage img { max-width: 100%; height: auto; border-radius: 8px; border: 1px solid var(--rule); }

  #modelAnswerBox { display: none; margin-top: 22px; padding: 18px; border-radius: 10px; border: 1px solid #a9d4b8; background: #f6faf7; }
  #modelAnswerBox strong.label { color: #245e3f; font-size: 13px; display: flex; align-items: center; gap: 6px; font-family: "Inter", sans-serif; }
  #modelAnswerText { font-family: "Lora", serif; font-size: 13px; line-height: 1.8; color: var(--ink-soft); margin-top: 10px; }

  #writingResultsBox { display: none; margin-bottom: 18px; padding: 18px 20px; border-radius: 12px; border: 1px solid var(--rule); background: var(--paper); }
  #writingResultsBox .wr-overall { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
  #writingResultsBox .wr-overall-band { font-family: "Fraunces", serif; font-size: 32px; font-weight: 800; color: var(--accent); }
  #writingResultsBox .wr-overall-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--ink-soft); }
  #writingResultsBox .wr-disclaimer { font-size: 11px; color: var(--ink-soft); line-height: 1.6; padding: 10px 12px; background: var(--accent-soft); border-radius: 8px; margin-bottom: 14px; }
  #writingResultsBox .wr-task { border-top: 1px solid var(--rule-soft); padding-top: 12px; margin-top: 12px; }
  #writingResultsBox .wr-task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  #writingResultsBox .wr-task-title { font-size: 13px; font-weight: 800; color: var(--ink); }
  #writingResultsBox .wr-task-band { font-size: 13px; font-weight: 800; color: var(--accent); }
  #writingResultsBox .wr-criteria { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; font-size: 11.5px; color: var(--ink-soft); margin-bottom: 8px; }
  #writingResultsBox .wr-criteria span.name { color: var(--ink); font-weight: 600; }
  #writingResultsBox .wr-notes { font-size: 11.5px; color: var(--ink-soft); line-height: 1.6; margin: 0; padding-left: 18px; }
  #writingResultsBox .wr-notes li { margin-bottom: 4px; }

  .editor-pane { width: 50%; height: 100%; overflow-y: auto; background: var(--page-bg); padding: 28px 30px; display: flex; flex-direction: column; }
  .editor-sheet { max-width: 560px; margin: 0 auto; background: var(--paper); border: 1px solid var(--rule); border-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 12px 32px rgba(28,26,23,.05); padding: 26px 30px 30px; flex: 1; display: flex; flex-direction: column; width: 100%; }

  .editor-label { font-size: 11px; font-weight: 800; color: var(--ink-soft); text-transform: uppercase; letter-spacing: .07em; }
  .clear-link { font-size: 10.5px; color: var(--accent); text-decoration: underline; background: none; border: none; cursor: pointer; }

  .essay-textarea {
    flex: 1; width: 100%; margin-top: 12px; background: #faf8f2; border: 1px solid var(--rule); border-radius: 10px;
    padding: 18px; outline: none; resize: none; color: var(--ink); font-family: "Lora", serif; font-size: 14.5px; line-height: 1.8; transition: all 0.2s;
  }
  .essay-textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(122,35,49,.08); background: var(--paper); }

  .editor-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--rule); padding-top: 14px; margin-top: 16px; }
  .word-count-label { font-size: 12px; color: var(--ink-soft); }
  .word-count-num { font-weight: 800; }
  .word-req-status { font-size: 10px; text-transform: uppercase; font-weight: 800; margin-top: 2px; }
  .export-btn { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--rule); background: var(--paper); font-size: 11.5px; font-weight: 700; cursor: pointer; color: var(--ink-soft); }
  .export-btn:hover { background: var(--rule-soft); }

  .bottom-nav { height: 62px; background: var(--paper); border-top: 1px solid var(--rule); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; }
  .autosave-note { font-size: 11.5px; color: #9c9385; }
  .nav-arrow { padding: 7px 15px; border-radius: 9px; border: 1.5px solid var(--rule); background: var(--paper); font-size: 12px; font-weight: 700; color: var(--ink-soft); cursor: pointer; transition: all .15s; }
  .nav-arrow:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .nav-arrow:disabled { opacity: .4; cursor: not-allowed; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(168,121,47,.3); border-radius: 4px; }
</style>
<script src="security.js"></script>
</head>

<body>

<header class="site-header">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="index.html" class="exit-link">&larr; Exit</a>
    <div>
      <div class="book-badge" id="testSetTag">Test Set</div>
      <div class="test-title" id="testTitle">Loading test...</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:16px;">
    <span class="mode-tag" id="modeIndicator">Mode: Exam</span>
    <div class="timer-pill">
      <span style="color:var(--accent);font-size:12px;">&#9201;</span>
      <span class="timer-text" id="timerText">60:00</span>
    </div>
  </div>
  <button onclick="submitTest()" class="submit-btn" id="submitBtn">Submit Writing</button>
</header>

<div class="test-container" id="testBody">

  <div class="prompt-pane">
    <div class="prompt-sheet">
      <div class="task-tabs" id="taskTabs">
        <button onclick="switchTask(1)" id="tab1" class="task-tab active">Task 1 (Academic)</button>
        <button onclick="switchTask(2)" id="tab2" class="task-tab">Task 2 (Essay)</button>
      </div>

      <h1 class="task-title" id="taskTitle">Writing Task 1</h1>

      <div class="info-banner">
        <span id="taskTimeRecommendation">Recommended time: 20 minutes</span>
        <span id="taskWordRequirement">Minimum words: 150</span>
      </div>

      <div class="prompt-text" id="promptText">Loading prompt...</div>

      <div id="graphContainer">
        <div id="graphicImage"></div>
      </div>

      <div id="modelAnswerBox">
        <strong class="label">&#127942; Band 9 Model Response</strong>
        <p id="modelAnswerText"></p>
      </div>
    </div>
  </div>

  <div class="editor-pane">
    <div class="editor-sheet">
      <div id="writingResultsBox"></div>

      <div style="display:flex;justify-content:space-between;align-items:center;">
        <label for="essayInput" class="editor-label">Type your response below</label>
        <button onclick="clearEssay()" class="clear-link">Clear editor</button>
      </div>

      <textarea id="essayInput" oninput="handleTyping()" class="essay-textarea" placeholder="Start typing your essay response here..."></textarea>

      <div class="editor-footer">
        <div>
          <div class="word-count-label">Words: <span id="wordCount" class="word-count-num">0</span></div>
          <div id="wordRequirementStatus" class="word-req-status">Needs 150 words</div>
        </div>
        <button onclick="downloadEssay()" class="export-btn">&#128190; Export Essay (.txt)</button>
      </div>
    </div>
  </div>

</div>

<footer class="bottom-nav">
  <div class="autosave-note">Writing answers are saved automatically as you type.</div>
  <div style="display:flex;gap:8px;">
    <button onclick="switchTask(1)" id="footerPrevBtn" class="nav-arrow" disabled>&larr; Task 1</button>
    <button onclick="switchTask(2)" id="footerNextBtn" class="nav-arrow">Task 2 &rarr;</button>
  </div>
</footer>

<script src="test-data.js"></script>
<script>
function formatTestId(id) {
  var n = parseInt(id, 10);
  return isNaN(n) ? id : (n < 10 ? '0' + n : String(n));
}

const urlParams = new URLSearchParams(window.location.search);
const testId = urlParams.get('test') || '1';
const testData = IELTS_TEST_DATA[testId];

if (!testData) {
  alert('Test Set not found! Redirecting to Test 1.');
  window.location.search = '?test=1';
}

const currentTestMode = localStorage.getItem('vietest_practice_mode') || 'exam';
let currentTask = 1;
let essayContent = { 1: '', 2: '' };
let timeRemaining = 60 * 60;
let timerInterval;

essayContent[1] = localStorage.getItem(`autosave_test_${testId}_writing_task1`) || '';
essayContent[2] = localStorage.getItem(`autosave_test_${testId}_writing_task2`) || '';

function showComingSoon() {
  document.getElementById('testTitle').textContent = testData.title;
  document.getElementById('testSetTag').textContent = 'IELTS Academic — Test ' + formatTestId(testId);
  document.getElementById('submitBtn').style.display = 'none';
  document.getElementById('timerText').parentElement.style.display = 'none';
  document.getElementById('modeIndicator').textContent = '';
  document.querySelector('.bottom-nav').style.display = 'none';
  document.getElementById('testBody').innerHTML = `
    <div style="max-width:480px;margin:80px auto;text-align:center;background:var(--paper);border:1px solid var(--rule);border-radius:14px;padding:40px 34px;box-shadow:0 12px 32px rgba(28,26,23,.06);">
      <h2 style="font-family:'Fraunces',serif;font-size:22px;margin:0 0 10px;color:var(--ink);">Writing module coming soon</h2>
      <p style="font-size:13.5px;color:var(--ink-soft);line-height:1.6;margin:0 0 20px;">The official Writing tasks for <strong>${testData.title}</strong> are still being added to the platform. This won't affect your Listening practice for this test.</p>
      <a href="index.html" style="display:inline-block;padding:9px 20px;border-radius:9px;background:var(--accent);color:#fff;text-decoration:none;font-size:12.5px;font-weight:700;">Return to Lobby</a>
    </div>
  `;
}

function initTest() {
  if (!testData.writing || !testData.writing.task1 || !testData.writing.task2) {
    showComingSoon();
    return;
  }

  document.getElementById('testTitle').textContent = testData.title;
  document.getElementById('testSetTag').textContent = 'IELTS Academic — Test ' + formatTestId(testId);
  document.getElementById('modeIndicator').textContent = `Mode: ${currentTestMode === 'exam' ? 'Exam' : 'Practice'}`;

  if (currentTestMode === 'practice') {
    timeRemaining = 0;
    document.getElementById('timerText').textContent = '00:00';
    timerInterval = setInterval(() => {
      timeRemaining++;
      const m = Math.floor(timeRemaining / 60);
      const s = timeRemaining % 60;
      document.getElementById('timerText').textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
    }, 1000);
    document.getElementById('modelAnswerBox').style.display = 'block';
  } else {
    timeRemaining = 60 * 60;
    timerInterval = setInterval(() => {
      timeRemaining--;
      const m = Math.floor(timeRemaining / 60);
      const s = timeRemaining % 60;
      document.getElementById('timerText').textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      if (timeRemaining < 300) {
        document.getElementById('timerText').style.color = '#8a2c1f';
      }
      if (timeRemaining <= 0) {
        clearInterval(timerInterval);
        document.getElementById('essayInput').disabled = true;
        alert('Time is up! Submitting writing responses automatically.');
        submitTest(true);
      }
    }, 1000);
  }

  switchTask(1);
}

function switchTask(taskNum) {
  const currentVal = document.getElementById('essayInput').value;
  essayContent[currentTask] = currentVal;
  localStorage.setItem(`autosave_test_${testId}_writing_task${currentTask}`, currentVal);

  currentTask = taskNum;

  const tab1 = document.getElementById('tab1');
  const tab2 = document.getElementById('tab2');
  const footerPrevBtn = document.getElementById('footerPrevBtn');
  const footerNextBtn = document.getElementById('footerNextBtn');

  if (taskNum === 1) {
    tab1.classList.add('active');
    tab2.classList.remove('active');
    document.getElementById('taskTitle').textContent = "Writing Task 1 (Academic)";
    document.getElementById('taskTimeRecommendation').textContent = "Recommended time: 20 minutes";
    document.getElementById('taskWordRequirement').textContent = "Minimum words: 150";

    const prompt = testData.writing.task1.prompt;
    document.getElementById('promptText').innerHTML = `
      <span class="prompt-kicker">Writing Task 1</span>
      <p style="margin:0;font-size:12px;color:var(--ink-soft);">You should spend about 20 minutes on this task.</p>
      <p class="prompt-statement">${prompt}</p>
      <p class="prompt-note">Summarise the information by selecting and reporting the main features, and make comparisons where relevant.</p>
      <p class="prompt-req">Write at least 150 words.</p>
    `;

    document.getElementById('graphContainer').style.display = 'block';
    document.getElementById('graphicImage').innerHTML = testData.writing.task1.image;
    document.getElementById('modelAnswerText').textContent = testData.writing.task1.modelAnswer;

    footerPrevBtn.disabled = true;
    footerNextBtn.disabled = false;
  } else {
    tab2.classList.add('active');
    tab1.classList.remove('active');
    document.getElementById('taskTitle').textContent = "Writing Task 2 (General Essay)";
    document.getElementById('taskTimeRecommendation').textContent = "Recommended time: 40 minutes";
    document.getElementById('taskWordRequirement').textContent = "Minimum words: 250";

    const prompt = testData.writing.task2.prompt;
    document.getElementById('promptText').innerHTML = `
      <span class="prompt-kicker">Writing Task 2</span>
      <p style="margin:0;font-size:12px;color:var(--ink-soft);">You should spend about 40 minutes on this task. Write about the following topic:</p>
      <p class="prompt-statement">${prompt}</p>
      <p class="prompt-note">Give reasons for your answer and include any relevant examples from your own knowledge or experience.</p>
      <p class="prompt-req">Write at least 250 words.</p>
    `;

    document.getElementById('graphContainer').style.display = 'none';
    document.getElementById('modelAnswerText').textContent = testData.writing.task2.modelAnswer;

    footerNextBtn.disabled = true;
    footerPrevBtn.disabled = false;
  }

  document.getElementById('essayInput').value = essayContent[currentTask];
  calculateWordCount();
}

function handleTyping() {
  const val = document.getElementById('essayInput').value;
  essayContent[currentTask] = val;
  localStorage.setItem(`autosave_test_${testId}_writing_task${currentTask}`, val);
  calculateWordCount();
}

function calculateWordCount() {
  const text = document.getElementById('essayInput').value.trim();
  const wordCount = text === "" ? 0 : text.split(/\s+/).length;

  const wcText = document.getElementById('wordCount');
  const reqText = document.getElementById('wordRequirementStatus');
  const reqLimit = currentTask === 1 ? 150 : 250;

  wcText.textContent = wordCount;

  if (wordCount < reqLimit) {
    wcText.style.color = '#8a2c1f';
    reqText.textContent = `Needs ${reqLimit - wordCount} more words`;
    reqText.style.color = '#8a2c1f';
  } else {
    wcText.style.color = '#245e3f';
    reqText.textContent = "Word count goal achieved";
    reqText.style.color = '#245e3f';
  }
}

function wordCountOf(text) {
  const t = (text || '').trim();
  return t === '' ? 0 : t.split(/\s+/).length;
}

function clearEssay() {
  if (confirm("Clear all text inside the editor for this task? This cannot be undone.")) {
    document.getElementById('essayInput').value = '';
    handleTyping();
  }
}

function downloadEssay() {
  const currentVal = document.getElementById('essayInput').value;
  essayContent[currentTask] = currentVal;

  const outputText = `ViATestPrep IELTS Writing Practice Output
=============================================
Test Set: Test ${formatTestId(testId)}
Date: ${new Date().toLocaleDateString()}
---------------------------------------------
TASK 1 RESPONSE (Word count: ${essayContent[1].trim() === "" ? 0 : essayContent[1].trim().split(/\s+/).length})
---------------------------------------------
${essayContent[1] || '[No draft entered]'}

---------------------------------------------
TASK 2 RESPONSE (Word count: ${essayContent[2].trim() === "" ? 0 : essayContent[2].trim().split(/\s+/).length})
---------------------------------------------
${essayContent[2] || '[No draft entered]'}`;

  const blob = new Blob([outputText], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `viatestprep_writing_test_${testId}_draft.txt`;
  a.click();
  URL.revokeObjectURL(url);
}

async function submitTest(autoSubmit = false) {
  essayContent[currentTask] = document.getElementById('essayInput').value;

  if (!autoSubmit) {
    // Real completion gate, not just a confirm() dialog - both tasks must
    // meet their minimum word count before a student can submit manually.
    // Auto-submit (timer expiry) bypasses this since there's no more time
    // left to write regardless.
    const t1Words = wordCountOf(essayContent[1]);
    const t2Words = wordCountOf(essayContent[2]);
    const missing = [];
    if (t1Words < 150) missing.push(`Task 1: ${t1Words}/150 words`);
    if (t2Words < 250) missing.push(`Task 2: ${t2Words}/250 words`);
    if (missing.length) {
      alert('You cannot submit yet - both tasks need to reach their minimum word count first:\n\n' + missing.join('\n') + '\n\nKeep writing, or wait for the timer to run out to auto-submit as-is.');
      return;
    }
    if (!confirm("Are you sure you want to submit your writing exam? This will freeze your drafts and grade your responses.")) return;
  }

  clearInterval(timerInterval);
  document.getElementById('essayInput').disabled = true;
  const submitBtnEl = document.getElementById('submitBtn');
  if (submitBtnEl) { submitBtnEl.disabled = true; submitBtnEl.textContent = 'Grading...'; }

  localStorage.setItem(`autosave_test_${testId}_writing_task1`, essayContent[1]);
  localStorage.setItem(`autosave_test_${testId}_writing_task2`, essayContent[2]);
  localStorage.setItem(`score_test_${testId}_writing`, 'completed');

  // Auto-syncs the draft essays + auto-grade into the student's CRM profile
  // - but only if this browser is logged in as a real roster student (see
  // attemptStudentTokenLogin in index.html). Anonymous "free trial" visitors
  // still get graded (see the /api/writing/grade fallback below), just
  // nothing is recorded for them since there's no student row to attach it to.
  const activeStudentId = localStorage.getItem('viatestprep_active_student_id');
  let graded = null;
  try {
    if (activeStudentId) {
      const res = await fetch('/api/mock/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          studentId: activeStudentId,
          testName: testData.title,
          moduleType: 'writing',
          writingTask1: essayContent[1],
          writingTask2: essayContent[2]
        })
      });
      const data = await res.json();
      graded = data.graded;
    } else {
      const res = await fetch('/api/writing/grade', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ writingTask1: essayContent[1], writingTask2: essayContent[2] })
      });
      const data = await res.json();
      if (data.ok) graded = data.graded;
    }
  } catch (e) {
    console.error('Could not grade/sync writing submission:', e);
  }

  renderWritingResults(graded);

  document.getElementById('modelAnswerBox').style.display = 'block';
  if (submitBtnEl) submitBtnEl.remove();

  const header = document.querySelector('.site-header');
  const returnBtn = document.createElement('a');
  returnBtn.href = "index.html";
  returnBtn.style.cssText = 'padding:7px 16px;border-radius:9px;background:#2f7a52;color:#fff;font-size:12px;font-weight:700;text-decoration:none;';
  returnBtn.textContent = "Return to Lobby";
  header.appendChild(returnBtn);
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Renders the automated (non-AI, rule-based) band + per-criterion feedback
// from api/_lib/writingGrader.js. `graded` can be null if grading failed
// (e.g. a network error) - shows a fallback message rather than nothing.
function renderWritingResults(graded) {
  const box = document.getElementById('writingResultsBox');
  if (!graded) {
    box.innerHTML = `<div class="wr-disclaimer">Your drafts were saved, but automated grading could not be reached just now. Export your essay and share it with a tutor for review.</div>`;
    box.style.display = 'block';
    return;
  }

  const criterionLabel = { taskAchievement: 'Task Achievement', coherenceCohesion: 'Coherence &amp; Cohesion', lexicalResource: 'Lexical Resource', grammaticalRange: 'Grammatical Range &amp; Accuracy' };

  function taskBlock(task, title) {
    if (!task) return `<div class="wr-task"><div class="wr-task-header"><span class="wr-task-title">${title}</span><span class="wr-task-band">Not submitted</span></div></div>`;
    const criteriaHtml = Object.entries(task.criteria).map(([key, band]) =>
      `<div><span class="name">${criterionLabel[key]}:</span> Band ${band.toFixed(1)}</div>`
    ).join('');
    const allNotes = Object.values(task.notes).flat();
    const notesHtml = allNotes.length
      ? `<ul class="wr-notes">${allNotes.map(n => `<li>${escapeHtml(n)}</li>`).join('')}</ul>`
      : `<p class="wr-notes" style="padding-left:0;">No specific issues flagged for this task.</p>`;
    return `
      <div class="wr-task">
        <div class="wr-task-header"><span class="wr-task-title">${title} (${task.wordCount} words)</span><span class="wr-task-band">Band ${task.band.toFixed(1)}</span></div>
        <div class="wr-criteria">${criteriaHtml}</div>
        ${notesHtml}
      </div>`;
  }

  box.innerHTML = `
    <div class="wr-overall">
      <span class="wr-overall-band">${graded.overallBand != null ? graded.overallBand.toFixed(1) : '—'}</span>
      <span class="wr-overall-label">Automated Writing Band Estimate</span>
    </div>
    <div class="wr-disclaimer">${escapeHtml(graded.disclaimer)}</div>
    ${taskBlock(graded.task1, 'Task 1')}
    ${taskBlock(graded.task2, 'Task 2')}
  `;
  box.style.display = 'block';
  box.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

initTest();
</script>
