<!DOCTYPE html>
<html lang="en" class="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IELTS Reading Test — ViATestPrep</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@400;500;600;700;800&family=Fraunces:wght@600;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    :root {
      --paper: #fffefb;
      --page-bg: #eae6dc;
      --ink: #1c1a17;
      --ink-soft: #4a453d;
      --rule: rgba(28, 26, 23, 0.14);
      --rule-soft: rgba(28, 26, 23, 0.08);
      --accent: #7a2331;
      --accent-soft: #f6e9ea;
      --gold: #a8792f;
    }
    body { background: var(--page-bg); color: var(--ink); font-family: "Inter", sans-serif; margin: 0; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    .site-header {
      background: var(--paper); border-bottom: 1px solid var(--rule); height: 62px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; z-index: 50; box-shadow: 0 1px 0 rgba(0,0,0,.02);
    }
    .exit-link { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--rule); font-size: 12px; font-weight: 700; color: var(--ink-soft); text-decoration: none; }
    .exit-link:hover { background: var(--rule-soft); }
    .book-badge { font-size: 9px; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: .1em; }
    .test-title { font-size: 14px; font-weight: 700; color: var(--ink); font-family: "Fraunces", serif; }
    .mode-tag { font-size: 11px; color: var(--ink-soft); font-weight: 600; }
    .timer-pill { display: flex; align-items: center; gap: 6px; background: var(--accent-soft); border: 1px solid rgba(122,35,49,.18); border-radius: 20px; padding: 5px 14px; }
    .timer-text { font-size: 13px; font-weight: 800; font-family: "JetBrains Mono", monospace; color: var(--accent); }
    .submit-btn { padding: 7px 18px; border-radius: 9px; background: var(--accent); color: #fff; border: none; font-size: 12px; font-weight: 700; cursor: pointer; box-shadow: 0 2px 8px rgba(122,35,49,.25); transition: background .15s; }
    .submit-btn:hover { background: #5e1a25; }

    .test-container { flex: 1; display: flex; overflow: hidden; }

    .passage-pane {
      width: 50%; height: 100%; overflow-y: auto; border-right: 1px solid var(--rule);
      background: var(--page-bg); padding: 28px 30px;
    }
    .passage-sheet {
      max-width: 620px; margin: 0 auto; background: var(--paper); border: 1px solid var(--rule);
      border-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 12px 32px rgba(28,26,23,.05);
      padding: 32px 36px 40px;
    }
    .passage-tabs { display: flex; gap: 6px; border-bottom: 1px solid var(--rule); padding-bottom: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .passage-tab {
      padding: 6px 13px; border-radius: 7px; font-size: 11.5px; font-weight: 700;
      cursor: pointer; border: 1px solid var(--rule); color: var(--ink-soft); background: var(--paper); transition: all .18s;
    }
    .passage-tab:hover { background: var(--rule-soft); }
    .passage-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    #passageContent { font-family: "Lora", serif; font-size: 14.5px; line-height: 1.9; color: var(--ink-soft); }
    #passageContent h1 { font-family: "Fraunces", serif; font-size: 21px; font-weight: 800; color: var(--ink); margin: 0 0 16px; border-bottom: 2px solid var(--ink); padding-bottom: 10px; }
    #passageContent p { margin: 0 0 14px; }
    #passageContent strong { color: var(--ink); }

    .questions-pane { width: 50%; height: 100%; overflow-y: auto; background: var(--page-bg); padding: 28px 30px 60px; }
    .answer-sheet {
      max-width: 560px; margin: 0 auto; background: var(--paper); border: 1px solid var(--rule);
      border-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.04), 0 12px 32px rgba(28,26,23,.05);
      padding: 30px 34px 40px;
    }
    .answer-sheet-heading { font-family: "Fraunces", serif; font-size: 18px; font-weight: 800; color: var(--ink); border-bottom: 2px solid var(--ink); padding-bottom: 10px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
    .scratchpad-toggle { font-size: 11px; color: var(--accent); background: none; border: none; cursor: pointer; font-weight: 700; padding: 0; font-family: "Inter", sans-serif; }
    #scratchpad { margin: 14px 0; padding: 12px; border-radius: 10px; border: 1px solid var(--rule); background: #faf8f2; }
    #scratchpadText { width: 100%; height: 70px; border: 1px solid var(--rule); border-radius: 7px; padding: 8px; font-size: 12px; resize: none; background: var(--paper); color: var(--ink-soft); outline: none; font-family: "Inter", sans-serif; }

    .instruction-box {
      border-left: 3px solid var(--gold); border-radius: 0; padding: 4px 0 4px 16px; margin: 20px 0 16px;
      font-size: 13.5px; color: var(--ink-soft); font-family: "Lora", serif; font-style: italic; line-height: 1.6;
    }
    .instruction-box strong, .instruction-box b { font-style: normal; color: var(--ink); }

    .q-box {
      border: 1px solid var(--rule-soft); background: var(--paper); border-radius: 10px;
      padding: 15px 17px; margin-bottom: 12px; transition: all .2s;
    }
    .q-box.flagged { border-color: var(--gold) !important; background: #fdf8ee; }
    .q-box.unavailable { border-color: var(--rule); background: #f4f2ec; }
    .q-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 9px; gap: 10px; }
    .q-num-badge {
      display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px;
      border-radius: 50%; border: 1.5px solid var(--ink); font-family: "Fraunces", serif; font-weight: 800;
      font-size: 12px; color: var(--ink); flex-shrink: 0;
    }
    .q-review-label { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #9c9385; cursor: pointer; user-select: none; }
    .q-review-label input[type="checkbox"] { accent-color: var(--gold); width: 13px; height: 13px; }
    .q-text { font-size: 14px; font-weight: 500; color: var(--ink); font-family: "Lora", serif; line-height: 1.7; margin: 0 0 10px; }
    .q-unavailable-note { font-size: 12.5px; color: #8a8375; font-style: italic; font-family: "Lora", serif; }

    .tfng-row { display: flex; gap: 8px; }
    .tfng-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1.5px solid var(--rule); font-size: 11.5px; font-weight: 700; cursor: pointer; background: var(--paper); color: var(--ink-soft); transition: all .15s; font-family: "Inter", sans-serif; }
    .tfng-btn:hover { border-color: var(--accent); }
    .tfng-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }

    .mcq-options { display: flex; flex-direction: column; gap: 7px; }
    .mcq-option { display: flex; align-items: flex-start; gap: 10px; padding: 9px 12px; border-radius: 8px; border: 1.5px solid var(--rule); cursor: pointer; font-size: 13px; color: var(--ink-soft); font-family: "Lora", serif; transition: all .15s; }
    .mcq-option:hover { background: var(--accent-soft); border-color: rgba(122,35,49,.3); }
    .mcq-option.selected { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 700; }
    .mcq-option .opt-letter { font-weight: 800; color: var(--accent); min-width: 16px; font-family: "Inter", sans-serif; }

    .input-fill {
      width: 100%; background: var(--paper); border: 1px solid var(--rule); border-radius: 7px;
      padding: 8px 11px; color: var(--ink); outline: none; font-family: "Inter", sans-serif; font-size: 13px; transition: all 0.2s;
    }
    .input-fill:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(122,35,49,.1); }

    .check-btn { padding: 6px 14px; background: #2f7a52; color: #fff; border: none; border-radius: 7px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: "Inter", sans-serif; }
    .check-btn:hover { background: #245e3f; }
    .feedback-box { margin-top: 10px; padding: 11px 13px; border-radius: 8px; font-size: 12px; font-family: "Inter", sans-serif; }
    .feedback-box.correct { background: #eef6f0; border: 1px solid #a9d4b8; color: #245e3f; }
    .feedback-box.wrong { background: #faeeec; border: 1px solid #e3b4ab; color: #8a2c1f; }

    .review-box { border-radius: 10px; border: 1.5px solid; padding: 15px 17px; margin-bottom: 12px; }
    .review-box.correct { border-color: #a9d4b8; background: #f6faf7; }
    .review-box.wrong { border-color: #e3b4ab; background: #fdf6f5; }
    .review-box.excluded { border-color: var(--rule); background: #f4f2ec; }

    .bottom-nav { height: 62px; background: var(--paper); border-top: 1px solid var(--rule); flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; gap: 10px; }
    .q-tray { display: flex; align-items: center; gap: 4px; overflow-x: auto; flex: 1; padding: 4px 0; }
    .q-tray::-webkit-scrollbar { height: 3px; }
    .q-tray::-webkit-scrollbar-thumb { background: rgba(168,121,47,.35); border-radius: 4px; }
    .q-nav-btn { width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid var(--rule); background: var(--paper); font-size: 10.5px; font-weight: 700; color: var(--ink-soft); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; position: relative; font-family: "Inter", sans-serif; }
    .q-nav-btn:hover { border-color: var(--gold); background: #f6f1e4; }
    .q-nav-btn.answered { background: var(--accent); border-color: var(--accent); color: #fff; }
    .q-nav-btn.current { box-shadow: 0 0 0 2.5px var(--gold); }
    .q-nav-btn.flagged::after { content: "\25CF"; font-size: 7px; color: var(--gold); position: absolute; top: -4px; right: -4px; }
    .nav-arrow { padding: 7px 15px; border-radius: 9px; border: 1.5px solid var(--rule); background: var(--paper); font-size: 12px; font-weight: 700; color: var(--ink-soft); cursor: pointer; transition: all .15s; font-family: "Inter", sans-serif; }
    .nav-arrow:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

    .highlight-yellow { background: rgba(253, 224, 71, 0.45); }
    .highlight-pink { background: rgba(244, 114, 182, 0.35); }
    .highlight-green { background: rgba(74, 222, 128, 0.35); }
    #highlightTooltip { display: none; position: absolute; z-index: 1000; background: var(--ink); border-radius: 8px; padding: 5px; box-shadow: 0 10px 20px rgba(0,0,0,.25); gap: 6px; }
    #highlightTooltip button { width: 22px; height: 22px; border-radius: 50%; border: 1px solid rgba(255,255,255,.25); cursor: pointer; }

    .coming-soon { max-width: 480px; margin: 80px auto; text-align: center; background: var(--paper); border: 1px solid var(--rule); border-radius: 14px; padding: 40px 34px; box-shadow: 0 12px 32px rgba(28,26,23,.06); }
    .coming-soon h2 { font-family: "Fraunces", serif; font-size: 22px; margin: 0 0 10px; color: var(--ink); }
    .coming-soon p { font-size: 13.5px; color: var(--ink-soft); line-height: 1.6; margin: 0 0 20px; }
    .coming-soon a { display: inline-block; padding: 9px 20px; border-radius: 9px; background: var(--accent); color: #fff; text-decoration: none; font-size: 12.5px; font-weight: 700; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(168,121,47,.3); border-radius: 4px; }
  </style>
  <script src="security.js"></script>
</head>

<body>

  <div id="highlightTooltip">
    <button onclick="applyHighlight('yellow')" style="background:#fde047;" title="Yellow"></button>
    <button onclick="applyHighlight('pink')" style="background:#f472b6;" title="Pink"></button>
    <button onclick="applyHighlight('green')" style="background:#4ade80;" title="Green"></button>
    <button onclick="applyHighlight('clear')" style="background:#4a453d;color:#fff;font-size:11px;" title="Clear">&times;</button>
  </div>

  <header class="site-header">
    <div style="display:flex;align-items:center;gap:14px;">
      <a href="index.html" class="exit-link">&larr; Exit</a>
      <div>
        <div class="book-badge" id="testSetTag">Test Set</div>
        <div class="test-title" id="testTitle">Loading test...</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <span class="mode-tag" id="modeIndicator">Mode: Exam</span>
      <div class="timer-pill">
        <span style="color:var(--accent);font-size:12px;">&#9201;</span>
        <span class="timer-text" id="timerText">60:00</span>
      </div>
    </div>
    <button onclick="submitTest()" id="submitBtn" class="submit-btn">Submit Test</button>
  </header>

  <div id="testBody" class="test-container">
    <div class="passage-pane" id="passagePane" onmouseup="handleTextSelection(event)">
      <div class="passage-sheet">
        <div class="passage-tabs" id="passageTabs"></div>
        <div id="passageContent"></div>
      </div>
    </div>

    <div class="questions-pane">
      <div class="answer-sheet">
        <div class="answer-sheet-heading">
          <span>Answer Sheet</span>
          <button onclick="toggleScratchpad()" class="scratchpad-toggle">&#9998; Scratchpad</button>
        </div>
        <div id="scratchpad" style="display:none;">
          <textarea id="scratchpadText" oninput="saveScratchpad()" placeholder="Draft headings, spellings, notes..."></textarea>
        </div>
        <div id="questionsContainer"></div>
      </div>
    </div>
  </div>

  <footer class="bottom-nav" id="bottomFooter">
    <div class="q-tray" id="bottomNavTray"></div>
    <div style="display:flex;gap:7px;">
      <button class="nav-arrow" onclick="navigateQuestion(-1)">&larr; Prev</button>
      <button class="nav-arrow" onclick="navigateQuestion(1)">Next &rarr;</button>
    </div>
  </footer>

  <script src="test-data.js"></script>
  <script src="unique-test-data.js"></script>
  <script>
    function formatTestId(id) {
      var n = parseInt(id, 10);
      return isNaN(n) ? id : (n < 10 ? '0' + n : String(n));
    }

    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get('test') || '1';
    const testData = IELTS_TEST_DATA[testId];

    if (!testData) {
      alert('Test Set not found! Redirecting to Test 1.');
      window.location.search = '?test=1';
    }

    const currentTestMode = localStorage.getItem('vietest_practice_mode') || 'exam';
    let currentPassageIdx = 0;
    let currentQuestionNum = 1;
    let userAnswers = {};
    let flaggedQuestions = {};
    let timeRemaining = 60 * 60;
    let timerInterval;
    let selectedRange = null;

    function showComingSoon() {
      document.getElementById('testTitle').textContent = testData.title;
      document.getElementById('testSetTag').textContent = 'IELTS Academic — Test ' + formatTestId(testId);
      document.getElementById('submitBtn').style.display = 'none';
      document.getElementById('timerText').parentElement.style.display = 'none';
      document.getElementById('modeIndicator').textContent = '';
      document.getElementById('bottomFooter').style.display = 'none';
      document.getElementById('testBody').innerHTML = '<div class="coming-soon">' +
        '<h2>Reading module coming soon</h2>' +
        '<p>The official Reading passages for <strong>' + testData.title + '</strong> are still being added to the platform. This won\'t affect your Listening practice for this test.</p>' +
        '<a href="index.html">Return to Lobby</a>' +
        '</div>';
    }

    function scrollToQuestion(qNum) {
      const targetBox = document.getElementById(`qbox-${qNum}`);
      const pane = document.querySelector('.questions-pane');
      if (targetBox && pane) {
        const topPos = targetBox.offsetTop - pane.offsetTop - (pane.clientHeight / 2) + (targetBox.clientHeight / 2);
        pane.scrollTo({ top: topPos, behavior: 'smooth' });
      }
    }

    function initTest() {
      if (!testData.reading || !testData.reading.passages || !testData.reading.passages.length) {
        showComingSoon();
        return;
      }

      document.getElementById('testTitle').textContent = testData.title;
      document.getElementById('testSetTag').textContent = 'IELTS Academic — Test ' + formatTestId(testId);
      document.getElementById('modeIndicator').textContent = `Mode: ${currentTestMode === 'exam' ? 'Exam' : 'Practice'}`;

      if (currentTestMode === 'practice') {
        timeRemaining = 0;
        document.getElementById('timerText').textContent = '00:00';
        timerInterval = setInterval(() => {
          timeRemaining++;
          updateTimerDisplay(true);
        }, 1000);
      } else {
        timeRemaining = 60 * 60;
        updateTimerDisplay(false);
        timerInterval = setInterval(() => {
          timeRemaining--;
          updateTimerDisplay(false);
          if (timeRemaining <= 0) {
            clearInterval(timerInterval);
            alert('Time is up! Submitting your test automatically.');
            submitTest(true);
          }
        }, 1000);
      }

      const tabTray = document.getElementById('passageTabs');
      tabTray.innerHTML = '';
      testData.reading.passages.forEach((p, idx) => {
        const btn = document.createElement('button');
        btn.className = 'passage-tab' + (idx === 0 ? ' active' : '');
        btn.textContent = `Passage ${idx + 1}`;
        btn.onclick = () => switchPassage(idx, btn);
        tabTray.appendChild(btn);
      });

      document.getElementById('scratchpadText').value = localStorage.getItem(`scratchpad_test_${testId}`) || '';

      renderPassage();
      renderQuestionsAndNav();
    }

    function updateTimerDisplay(countUp) {
      const m = Math.floor(Math.abs(timeRemaining) / 60);
      const s = Math.abs(timeRemaining) % 60;
      const timerText = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      const timerDisplay = document.getElementById('timerText');
      timerDisplay.textContent = timerText;
      if (!countUp && timeRemaining < 300) {
        timerDisplay.parentElement.style.color = '#8a2c1f';
      }
    }

    function switchPassage(idx, btnEl) {
      currentPassageIdx = idx;
      document.querySelectorAll('.passage-tab').forEach(b => b.classList.remove('active'));
      btnEl.classList.add('active');
      renderPassage();
      renderQuestionsAndNav();
      setTimeout(() => scrollToQuestion(currentQuestionNum), 100);
    }

    function renderPassage() {
      const passage = testData.reading.passages[currentPassageIdx];
      document.getElementById('passageContent').innerHTML = passage.text;
    }

    function renderQuestionsAndNav() {
      const passage = testData.reading.passages[currentPassageIdx];
      const qContainer = document.getElementById('questionsContainer');
      qContainer.innerHTML = '';

      let lastInstruction = null;
      passage.questions.forEach((q, idx) => {
        if (q.instruction && q.instruction.trim()) {
          if (q.instruction !== lastInstruction) {
            const instBox = document.createElement('div');
            instBox.className = 'instruction-box';
            instBox.innerHTML = q.instruction;
            qContainer.appendChild(instBox);
            lastInstruction = q.instruction;
          }
        } else {
          lastInstruction = null;
        }

        const qBox = document.createElement('div');
        qBox.className = 'q-box';
        qBox.id = `qbox-${q.num}`;
        if (flaggedQuestions[q.num]) qBox.classList.add('flagged');
        if (q.contentUnavailable) qBox.classList.add('unavailable');

        const headerRow = document.createElement('div');
        headerRow.className = 'q-header-row';
        headerRow.innerHTML = `<span class="q-num-badge">${q.num}</span>` +
          (q.contentUnavailable ? '' : `<label class="q-review-label"><input type="checkbox" onchange="toggleFlag(${q.num})" ${flaggedQuestions[q.num] ? 'checked' : ''} /> Review</label>`);
        qBox.appendChild(headerRow);

        if (q.contentUnavailable) {
          const note = document.createElement('p');
          note.className = 'q-unavailable-note';
          note.textContent = "This question's source text could not be recovered during data restoration, so it is excluded from scoring.";
          qBox.appendChild(note);
          qContainer.appendChild(qBox);
          return;
        }

        const textEl = document.createElement('p');
        textEl.className = 'q-text';
        textEl.innerHTML = q.text;
        qBox.appendChild(textEl);

        let answerHtml = '';
        if (q.type === 'TFNG' || q.type === 'YNNG') {
          // YNNG (Yes/No/Not Given, for writer's-views passages) renders
          // identically to TFNG (True/False/Not Given, for factual passages) -
          // the button labels come straight from q.options either way.
          const selected = userAnswers[q.num] || '';
          answerHtml = `<div class="tfng-row">${q.options.map(opt => `
            <button onclick="selectOption(${q.num}, '${opt}')" class="tfng-btn ${selected === opt ? 'selected' : ''}">${opt}</button>
          `).join('')}</div>`;
        } else if (q.type === 'MCQ') {
          const selected = userAnswers[q.num] || '';
          answerHtml = `<div class="mcq-options">${q.options.map(opt => {
            const dotIdx = opt.indexOf('.');
            const letter = dotIdx !== -1 ? opt.slice(0, dotIdx).trim() : opt.trim();
            const text = dotIdx !== -1 ? opt.slice(dotIdx + 1) : '';
            const displayLetter = dotIdx !== -1 ? opt.slice(0, dotIdx + 1) : opt;
            return `
              <button onclick="selectOption(${q.num}, '${letter}')" class="mcq-option ${selected === letter ? 'selected' : ''}">
                <span class="opt-letter">${displayLetter}</span><span>${text}</span>
              </button>
            `;
          }).join('')}</div>`;
        } else if (q.type === 'FILL') {
          const val = userAnswers[q.num] || '';
          answerHtml = `<input type="text" oninput="handleInput(${q.num}, this.value)" class="input-fill" value="${escapeHtml(val)}" placeholder="Type your answer here..." />`;
        } else if (q.type === 'HEADING' || q.type === 'MATCHING_INFO' || q.type === 'MATCHING_FEATURES' || q.type === 'ENDINGS') {
          // These four share one bare-letter-button UI: Matching Headings
          // uses roman numerals (i, ii, iii...), Matching Information uses
          // paragraph letters (A-G), Matching Features uses a short fixed
          // list of feature letters (A-E), and Matching Sentence Endings
          // uses letters for a bank of possible endings (A-F) - in every
          // case the full option list (headings / features / endings) is
          // shown once via the shared instruction box (see lastInstruction
          // dedup above), and each question here just needs its own bare
          // answer buttons, not the full text repeated per question.
          const selected = userAnswers[q.num] || '';
          answerHtml = `<div class="tfng-row">${q.options.map(opt => `
            <button onclick="selectOption(${q.num}, '${opt}')" class="tfng-btn ${selected === opt ? 'selected' : ''}">${opt}</button>
          `).join('')}</div>`;
        }
        qBox.insertAdjacentHTML('beforeend', answerHtml);

        if (currentTestMode === 'practice') {
          qBox.insertAdjacentHTML('beforeend', `
            <div style="display:flex;justify-content:flex-end;border-top:1px solid var(--rule-soft);margin-top:10px;padding-top:10px;" id="pract-actions-${q.num}">
              <button onclick="checkPracticeAnswer(${q.num}, ${idx})" class="check-btn">Check Answer</button>
            </div>
            <div id="pract-feedback-${q.num}"></div>
          `);
        }

        qContainer.appendChild(qBox);
      });

      const tray = document.getElementById('bottomNavTray');
      tray.innerHTML = '';
      testData.reading.passages.forEach((p, pIdx) => {
        p.questions.forEach((q) => {
          const btn = document.createElement('button');
          btn.className = `q-nav-btn ${userAnswers[q.num] ? 'answered' : ''} ${flaggedQuestions[q.num] ? 'flagged' : ''}`;
          btn.textContent = q.num;
          if (q.num === currentQuestionNum) btn.classList.add('current');
          btn.onclick = () => {
            currentQuestionNum = q.num;
            if (pIdx !== currentPassageIdx) {
              const tabBtn = document.querySelectorAll('.passage-tab')[pIdx];
              switchPassage(pIdx, tabBtn);
            } else {
              scrollToQuestion(q.num);
              document.querySelectorAll('.q-nav-btn').forEach(b => {
                b.classList.remove('current');
                if (parseInt(b.textContent) === q.num) b.classList.add('current');
              });
            }
          };
          tray.appendChild(btn);
        });
      });
    }

    function selectOption(qNum, val) {
      userAnswers[qNum] = val;
      renderQuestionsAndNav();
    }

    function handleInput(qNum, val) {
      userAnswers[qNum] = val;
      document.querySelectorAll('.q-nav-btn').forEach(btn => {
        if (btn.textContent == qNum) {
          if (val.trim()) btn.classList.add('answered'); else btn.classList.remove('answered');
        }
      });
    }

    function toggleFlag(qNum) {
      flaggedQuestions[qNum] = !flaggedQuestions[qNum];
      const qBox = document.getElementById(`qbox-${qNum}`);
      if (qBox) qBox.classList.toggle('flagged', flaggedQuestions[qNum]);
      renderQuestionsAndNav();
    }

    function checkPracticeAnswer(qNum, idx) {
      const passage = testData.reading.passages[currentPassageIdx];
      const q = passage.questions[idx];
      const uAns = (userAnswers[qNum] || '').trim().toLowerCase();
      const cAns = q.answer.trim().toLowerCase();

      const fdContainer = document.getElementById(`pract-feedback-${qNum}`);
      const isCorrect = uAns === cAns;

      if (isCorrect) {
        fdContainer.className = 'feedback-box correct';
        fdContainer.innerHTML = `
          <div style="font-weight:700;margin-bottom:4px;">Correct Answer</div>
          <p style="margin:0 0 6px;">Locating sentence: ${q.location || 'Within the passage.'}</p>
          <div><strong>Explanation:</strong> ${q.explanation}</div>
        `;
      } else {
        fdContainer.className = 'feedback-box wrong';
        fdContainer.innerHTML = `
          <div style="font-weight:700;margin-bottom:4px;">Incorrect</div>
          <p style="margin:0;">Your answer: <span style="text-decoration:line-through;">${escapeHtml(userAnswers[qNum] || 'None')}</span></p>
          <p style="margin:4px 0 6px;">Correct answer: <strong>${q.answer}</strong></p>
          <div><strong>Explanation:</strong> ${q.explanation}</div>
        `;
      }
    }

    function submitTest(autoSubmit = false) {
      if (!autoSubmit) {
        // Real completion gate, not just a confirm() dialog - every question
        // must be answered before a student can submit manually. Auto-submit
        // (timer expiry) bypasses this since there's no more time left
        // regardless. Same "answered" check already used for the
        // question-nav button styling (line ~419).
        let totalQs = 0, answered = 0;
        testData.reading.passages.forEach(p => {
          p.questions.forEach(q => {
            if (q.contentUnavailable) return;
            totalQs++;
            if (userAnswers[q.num]) answered++;
          });
        });
        if (answered < totalQs) {
          const remaining = totalQs - answered;
          alert(`You have ${remaining} unanswered question${remaining === 1 ? '' : 's'} left (out of ${totalQs}). Please answer every question before submitting, or wait for the timer to run out to auto-submit as-is.`);
          return;
        }
        if (!confirm('Are you sure you want to submit the test? You will see your total band score immediately.')) return;
      }

      clearInterval(timerInterval);

      let correctCount = 0;
      let totalQs = 0;

      testData.reading.passages.forEach(p => {
        p.questions.forEach(q => {
          if (q.contentUnavailable) return;
          totalQs++;
          const uAns = (userAnswers[q.num] || '').trim().toLowerCase();
          const cAns = q.answer.trim().toLowerCase();
          if (uAns === cAns) correctCount++;
        });
      });

      let band = 1.0;
      const pct = totalQs > 0 ? correctCount / totalQs : 0;
      if (pct >= 0.95) band = 9.0;
      else if (pct >= 0.88) band = 8.5;
      else if (pct >= 0.80) band = 8.0;
      else if (pct >= 0.72) band = 7.5;
      else if (pct >= 0.65) band = 7.0;
      else if (pct >= 0.58) band = 6.5;
      else if (pct >= 0.50) band = 6.0;
      else if (pct >= 0.40) band = 5.5;
      else if (pct >= 0.30) band = 5.0;
      else band = 4.0;

      localStorage.setItem(`score_test_${testId}_reading`, band.toFixed(1));

      // Auto-syncs this result into the student's CRM profile - but only if
      // this browser is logged in as a real roster student (i.e. they got
      // here via their own private "?student=<token>" link on the portal,
      // see attemptStudentTokenLogin in index.html). Anonymous "free trial"
      // visitors have no active student id, so nothing gets recorded for them.
      const activeStudentId = localStorage.getItem('viatestprep_active_student_id');
      if (activeStudentId) {
        fetch('/api/mock/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            studentId: activeStudentId,
            testName: testData.title,
            moduleType: 'reading',
            readingBand: parseFloat(band.toFixed(1))
          })
        }).catch(e => console.error('Could not sync reading result to CRM:', e));
      }

      alert(`Test Submitted Successfully!\nYour Score: ${correctCount}/${totalQs}\nEstimated IELTS Band: ${band.toFixed(1)}`);

      renderReviewMode();
    }

    function renderReviewMode() {
      document.getElementById('modeIndicator').textContent = 'Mode: Review';
      document.getElementById('submitBtn').remove();

      const header = document.querySelector('.site-header');
      const returnBtn = document.createElement('a');
      returnBtn.href = "index.html";
      returnBtn.style.cssText = 'padding:7px 16px;border-radius:9px;background:#2f7a52;color:#fff;font-size:12px;font-weight:700;text-decoration:none;';
      returnBtn.textContent = "Return to Lobby";
      header.appendChild(returnBtn);

      const qContainer = document.getElementById('questionsContainer');
      qContainer.innerHTML = '';

      const passage = testData.reading.passages[currentPassageIdx];
      passage.questions.forEach(q => {
        const qBox = document.createElement('div');

        if (q.contentUnavailable) {
          qBox.className = 'review-box excluded';
          qBox.innerHTML = `
            <div style="font-size:11px;font-weight:800;text-transform:uppercase;color:#8a8375;margin-bottom:6px;">Question ${q.num} — Excluded from scoring</div>
            <p style="font-size:13px;color:#6b6558;font-style:italic;font-family:'Lora',serif;">This question's source text could not be recovered and does not count toward your score.</p>
          `;
          qContainer.appendChild(qBox);
          return;
        }

        const uAns = (userAnswers[q.num] || '').trim();
        const cAns = q.answer.trim();
        const isCorrect = uAns.toLowerCase() === cAns.toLowerCase();

        qBox.className = `review-box ${isCorrect ? 'correct' : 'wrong'}`;
        qBox.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
            <span style="font-size:11px;font-weight:800;text-transform:uppercase;color:${isCorrect ? '#245e3f' : '#8a2c1f'};">${isCorrect ? 'Correct' : 'Incorrect'} — Question ${q.num}</span>
          </div>
          <p style="font-size:14px;font-weight:600;font-family:'Lora',serif;">${q.text}</p>
          <div style="font-size:12px;">
            <div>Your choice: <strong style="color:${isCorrect ? '#245e3f' : '#8a2c1f'};">${uAns || 'None'}</strong></div>
            ${!isCorrect ? `<div>Correct answer: <strong style="color:#245e3f;">${cAns}</strong></div>` : ''}
          </div>
          <div style="padding:10px 12px;background:#faf8f2;border:1px solid var(--rule);border-radius:8px;margin-top:10px;font-size:12px;color:#6b6558;">
            <div style="font-weight:700;color:var(--ink);margin-bottom:3px;">Explanation</div>
            <p style="margin:0;">${q.explanation}</p>
            ${q.location ? `<p style="margin:6px 0 0;color:#8a8375;font-style:italic;">${q.location}</p>` : ''}
          </div>
        `;
        qContainer.appendChild(qBox);
      });
    }

    function handleTextSelection(event) {
      const selection = window.getSelection();
      if (selection.rangeCount > 0 && !selection.isCollapsed) {
        selectedRange = selection.getRangeAt(0);
        showHighlightTooltip(event.clientX, event.clientY);
      } else {
        hideHighlightTooltip();
      }
    }

    function showHighlightTooltip(x, y) {
      const tooltip = document.getElementById('highlightTooltip');
      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y - 40}px`;
      tooltip.style.display = 'flex';
    }

    function hideHighlightTooltip() {
      document.getElementById('highlightTooltip').style.display = 'none';
    }

    function applyHighlight(color) {
      if (!selectedRange) return;
      if (color === 'clear') {
        const span = document.createElement('span');
        selectedRange.surroundContents(span);
      } else {
        const span = document.createElement('span');
        span.className = `highlight-${color}`;
        try {
          selectedRange.surroundContents(span);
        } catch (e) {
          console.warn('Selection too wide for standard highlighting.');
        }
      }
      window.getSelection().removeAllRanges();
      hideHighlightTooltip();
    }

    function toggleScratchpad() {
      document.getElementById('scratchpad').style.display =
        document.getElementById('scratchpad').style.display === 'none' ? 'block' : 'none';
    }

    function saveScratchpad() {
      localStorage.setItem(`scratchpad_test_${testId}`, document.getElementById('scratchpadText').value);
    }

    function navigateQuestion(direction) {
      let nextQNum = currentQuestionNum + direction;
      let totalQs = 0;
      testData.reading.passages.forEach(p => totalQs += p.questions.length);

      if (nextQNum >= 1 && nextQNum <= totalQs) {
        currentQuestionNum = nextQNum;
        let targetPassageIdx = -1;
        testData.reading.passages.forEach((p, pIdx) => {
          if (p.questions.some(q => q.num === currentQuestionNum)) targetPassageIdx = pIdx;
        });

        if (targetPassageIdx !== -1) {
          if (targetPassageIdx !== currentPassageIdx) {
            const tabBtn = document.querySelectorAll('.passage-tab')[targetPassageIdx];
            switchPassage(targetPassageIdx, tabBtn);
          } else {
            scrollToQuestion(currentQuestionNum);
            document.querySelectorAll('.q-nav-btn').forEach(btn => {
              btn.classList.remove('current');
              if (parseInt(btn.textContent) === currentQuestionNum) btn.classList.add('current');
            });
          }
        }
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    initTest();
  </script>
</body>

</html>
