<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IELTS Listening Simulator — ViATestPrep</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body { background: #f1f5f9; color: #1e293b; font-family: "Inter", sans-serif; margin: 0; }

    .site-header {
      background: #fff; border-bottom: 1px solid #e2e8f0; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; position: sticky; top: 0; z-index: 50;
      box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    .main-layout { display: flex; height: calc(100vh - 56px - 60px); overflow: hidden; }

    .audio-panel {
      width: 320px; flex-shrink: 0; background: #fff;
      border-right: 1px solid #e2e8f0; overflow-y: auto;
      display: flex; flex-direction: column; padding: 16px; gap: 14px;
    }
    .section-tabs { display: flex; gap: 6px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px; }
    .section-tab {
      padding: 5px 12px; border-radius: 7px; font-size: 12px; font-weight: 700;
      cursor: pointer; border: 1px solid transparent; color: #64748b; background: none; transition: all .18s;
    }
    .section-tab:hover { background: #f8fafc; color: #1e293b; }
    .section-tab.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }

    .audio-card {
      background: linear-gradient(135deg, #faf5ff 0%, #f0fdf4 100%);
      border: 1px solid #e9d5ff; border-radius: 16px; padding: 16px;
    }
    .audio-card .sec-label { font-size: 10px; font-weight: 800; color: #7c3aed; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; }
    .audio-card h3 { font-size: 14px; font-weight: 700; color: #1e293b; margin: 0 0 12px; }

    .timeline-bar {
      width: 100%; -webkit-appearance: none; height: 4px; border-radius: 4px;
      background: #ddd6fe; cursor: pointer; margin-bottom: 3px; display: block;
    }
    .timeline-bar::-webkit-slider-thumb {
      -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
      background: #7c3aed; cursor: pointer; box-shadow: 0 0 0 3px rgba(124,58,237,.2);
    }
    .time-labels { display: flex; justify-content: space-between; font-size: 10px; font-family: monospace; color: #94a3b8; margin-bottom: 10px; }

    .controls-row { display: flex; align-items: center; justify-content: space-between; }
    .play-btn {
      width: 42px; height: 42px; border-radius: 50%; background: #7c3aed; color: #fff;
      border: none; cursor: pointer; font-size: 17px; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(124,58,237,.35); transition: background .15s, transform .1s;
    }
    .play-btn:hover { background: #6d28d9; transform: scale(1.05); }
    .stop-btn {
      width: 30px; height: 30px; border-radius: 50%; background: #f1f5f9; border: 1px solid #e2e8f0;
      color: #94a3b8; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: background .15s;
    }
    .stop-btn:hover { background: #e2e8f0; }
    .speed-select {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 7px;
      padding: 4px 8px; font-size: 11px; font-weight: 700; color: #7c3aed; cursor: pointer; outline: none;
    }
    .notice-box {
      font-size: 11px; color: #0f766e; background: #f0fdfa;
      border: 1px solid #99f6e4; border-radius: 10px; padding: 10px 12px; line-height: 1.5;
    }
    .transcript-box {
      background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px;
      font-size: 11px; color: #475569; max-height: 200px; overflow-y: auto; line-height: 1.6;
    }

    .questions-panel { flex: 1; overflow-y: auto; padding: 20px 24px; background: #f1f5f9; }

    /* Green instruction banner */
    .instruction-banner {
      background: #e6f7f4; border: 1.5px solid #2db89e; border-radius: 10px;
      padding: 14px 18px; margin-bottom: 14px; font-size: 13px; color: #065f46;
      font-weight: 500; line-height: 1.55;
    }

    /* Question card */
    .q-card {
      background: #fff; border: 1.5px solid #e2e8f0; border-radius: 12px;
      padding: 16px 18px; margin-bottom: 10px; transition: border-color .2s, box-shadow .2s;
    }
    .q-card:hover { border-color: #c4b5fd; }
    .q-card.flagged { border-color: #f59e0b !important; background: #fffbeb; }
    .q-card.answered { border-color: #a7f3d0; }

    .q-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .q-label { font-size: 11px; font-weight: 800; color: #7c3aed; text-transform: uppercase; letter-spacing: .07em; }
    .q-review-label { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #94a3b8; cursor: pointer; user-select: none; }
    .q-review-label input[type="checkbox"] { accent-color: #f59e0b; width: 13px; height: 13px; }

    .q-body { font-size: 14px; font-weight: 600; color: #1e293b; line-height: 1.8; }

    /* Inline blank input */
    .q-blank-input {
      display: inline-block; width: 130px; border: none;
      border-bottom: 2.5px solid #7c3aed; background: transparent;
      color: #1e293b; font-weight: 700; font-size: 14px; font-family: inherit;
      padding: 0 4px 2px; outline: none; vertical-align: middle;
      transition: border-color .2s; text-align: center;
    }
    .q-blank-input:focus { border-color: #2db89e; background: #f0fdfa; border-radius: 4px 4px 0 0; }
    .q-blank-input::placeholder { color: #c4b5fd; font-weight: 400; font-size: 12px; }

    /* MCQ */
    .mcq-options { display: flex; flex-direction: column; gap: 7px; margin-top: 10px; }
    .mcq-option {
      display: flex; align-items: flex-start; gap: 9px; padding: 8px 12px;
      border-radius: 8px; border: 1.5px solid #e2e8f0; cursor: pointer;
      font-size: 13px; color: #334155; transition: all .15s;
    }
    .mcq-option:hover { background: #f5f3ff; border-color: #c4b5fd; }
    .mcq-option.selected { background: #ede9fe; border-color: #7c3aed; color: #4c1d95; font-weight: 700; }
    .mcq-option .opt-letter { font-weight: 800; color: #7c3aed; min-width: 16px; }
    .mcq-option.selected .opt-letter { color: #4c1d95; }

    .check-btn {
      padding: 5px 13px; background: #10b981; color: #fff; border: none;
      border-radius: 7px; font-size: 11px; font-weight: 700; cursor: pointer; transition: background .15s;
    }
    .check-btn:hover { background: #059669; }
    .feedback-correct { margin-top: 9px; padding: 9px 13px; border-radius: 8px; background: #ecfdf5; border: 1px solid #6ee7b7; font-size: 12px; color: #065f46; }
    .feedback-wrong { margin-top: 9px; padding: 9px 13px; border-radius: 8px; background: #fef2f2; border: 1px solid #fca5a5; font-size: 12px; color: #991b1b; }

    /* Bottom nav */
    .bottom-nav {
      height: 60px; background: #fff; border-top: 1px solid #e2e8f0;
      display: flex; align-items: center; justify-content: space-between; padding: 0 20px; gap: 10px;
    }
    .q-tray { display: flex; align-items: center; gap: 4px; overflow-x: auto; flex: 1; padding: 4px 0; }
    .q-tray::-webkit-scrollbar { height: 3px; }
    .q-tray::-webkit-scrollbar-thumb { background: #ddd6fe; border-radius: 4px; }
    .q-nav-btn {
      width: 29px; height: 29px; border-radius: 7px; border: 1.5px solid #e2e8f0; background: #f8fafc;
      font-size: 11px; font-weight: 700; color: #64748b; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all .15s; flex-shrink: 0; position: relative;
    }
    .q-nav-btn:hover { border-color: #a78bfa; background: #faf5ff; color: #4c1d95; }
    .q-nav-btn.answered { background: #7c3aed; border-color: #7c3aed; color: #fff; }
    .q-nav-btn.current { box-shadow: 0 0 0 2.5px #f59e0b; }
    .q-nav-btn.flagged::after { content: "??"; font-size: 8px; position: absolute; top: -3px; right: -3px; }
    .nav-btns { display: flex; gap: 7px; }
    .nav-arrow {
      padding: 6px 15px; border-radius: 9px; border: 1.5px solid #e2e8f0; background: #fff;
      font-size: 12px; font-weight: 700; color: #475569; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 4px;
    }
    .nav-arrow:hover { border-color: #7c3aed; color: #7c3aed; background: #faf5ff; }

    .review-card { background: #fff; border-radius: 12px; border: 1.5px solid; padding: 16px 18px; margin-bottom: 10px; }
    .review-card.correct { border-color: #6ee7b7; background: #ecfdf5; }
    .review-card.wrong { border-color: #fca5a5; background: #fef2f2; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd6fe; border-radius: 4px; }
  </style>
  <script src="security.js"></script>
  <script src="theme-loader.js"></script>
</head>

<body>

  <!-- HEADER -->
  <header class="site-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="index.html" style="padding:5px 13px;border-radius:8px;border:1px solid #e2e8f0;font-size:12px;font-weight:700;color:#475569;text-decoration:none;">? Exit</a>
      <div>
        <div style="font-size:10px;font-weight:800;color:#7c3aed;text-transform:uppercase;letter-spacing:.07em;" id="testSetTag">Test Set</div>
        <div style="font-size:14px;font-weight:700;color:#1e293b;" id="testTitle">Loading test...</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <span style="font-size:11px;color:#94a3b8;" id="modeIndicator">Mode: Exam</span>
      <div style="display:flex;align-items:center;gap:6px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:20px;padding:4px 14px;">
        <span>??</span>
        <span style="font-size:13px;font-weight:800;font-family:monospace;color:#1e293b;" id="timerText">30:00</span>
      </div>
    </div>
    <button onclick="submitTest()" id="submitBtn" style="padding:6px 18px;border-radius:9px;background:#7c3aed;color:#fff;border:none;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(124,58,237,.35);">Submit Test</button>
  </header>

  <!-- MAIN -->
  <div class="main-layout">

    <!-- LEFT: Audio Panel -->
    <div class="audio-panel" id="audioContainer">
      <div class="section-tabs" id="sectionTabs"></div>

      <div class="audio-card">
        <div class="sec-label" id="sectionSubLabel">Part 1</div>
        <h3 id="sectionTitle">Section 1</h3>
        <audio id="mainAudio" preload="auto"></audio>
        <input type="range" id="audioTimeline" class="timeline-bar" min="0" max="100" value="0" oninput="seekAudio(this.value)" />
        <div class="time-labels">
          <span id="currentTime">0:00</span>
          <span id="totalDuration">0:00</span>
        </div>
        <div class="controls-row">
          <div style="display:flex;align-items:center;gap:8px;">
            <button id="playBtn" class="play-btn" onclick="togglePlay()">?</button>
            <button class="stop-btn" onclick="stopAudio()">¦</button>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:10px;font-weight:700;color:#94a3b8;text-transform:uppercase;">Speed</span>
            <select id="audioSpeed" class="speed-select" onchange="setPlaybackSpeed(this.value)">
              <option value="0.75">0.75×</option>
              <option value="1.0" selected>1.0×</option>
              <option value="1.25">1.25×</option>
              <option value="1.5">1.5×</option>
            </select>
          </div>
        </div>
      </div>

      <div class="notice-box">
        <strong>? Important:</strong> In the real IELTS exam, you can only play the audio <strong>once</strong>. Use speed and scrub controls to practise.
      </div>

      <div>
        <button onclick="toggleScratchpad()" style="font-size:11px;color:#7c3aed;background:none;border:none;cursor:pointer;font-weight:700;padding:0;">?? Scratchpad</button>
        <div id="scratchpad" style="display:none;margin-top:8px;background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:10px;">
          <textarea id="scratchpadText" oninput="saveScratchpad()" placeholder="Write notes, spellings, guesses..." style="width:100%;height:70px;border:1px solid #e2e8f0;border-radius:7px;padding:7px;font-size:12px;resize:none;background:#f8fafc;color:#334155;outline:none;font-family:inherit;"></textarea>
        </div>
      </div>

      <div id="transcriptBox" class="transcript-box" style="display:none;">
        <strong style="font-size:11px;color:#334155;display:block;margin-bottom:6px;">?? Tape Script</strong>
        <div id="transcriptContent"></div>
      </div>
    </div>

    <!-- RIGHT: Questions Panel -->
    <div class="questions-panel" id="questionsPanel">
      <div id="questionsContainer"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <footer class="bottom-nav">
    <div class="q-tray" id="bottomNavTray"></div>
    <div class="nav-btns">
      <button class="nav-arrow" onclick="navigateQuestion(-1)">? Prev</button>
      <button class="nav-arrow" onclick="navigateQuestion(1)">Next ?</button>
    </div>
  </footer>

  <script src="test-data.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const testId = urlParams.get('test') || '1';
    const testData = IELTS_TEST_DATA[testId];
    if (!testData) { alert('Test not found! Redirecting to Test 1.'); window.location.search = '?test=1'; }

    const currentTestMode = localStorage.getItem('vietest_practice_mode') || 'exam';
    let currentSectionIdx = 0;
    let currentQuestionNum = 1;
    let userAnswers = {};
    let flaggedQuestions = {};
    let timeRemaining = 30 * 60;
    let timerInterval;

    const audio = document.getElementById('mainAudio');
    const playBtn = document.getElementById('playBtn');
    const timeline = document.getElementById('audioTimeline');

    function initTest() {
      document.getElementById('testTitle').textContent = testData.title;
      document.getElementById('testSetTag').textContent = 'IELTS Academic — Test 0' + testId;
      document.getElementById('modeIndicator').textContent = 'Mode: ' + (currentTestMode === 'exam' ? 'Exam' : 'Practice');

      if (currentTestMode === 'practice') {
        timeRemaining = 0;
        document.getElementById('timerText').textContent = '00:00';
        timerInterval = setInterval(function() { timeRemaining++; updateTimerDisplay(true); }, 1000);
      } else {
        updateTimerDisplay(false);
        timerInterval = setInterval(function() {
          timeRemaining--;
          updateTimerDisplay(false);
          if (timeRemaining <= 0) { clearInterval(timerInterval); alert('Time is up!'); submitTest(true); }
        }, 1000);
      }

      var tabTray = document.getElementById('sectionTabs');
      tabTray.innerHTML = '';
      testData.listening.sections.forEach(function(sec, idx) {
        var btn = document.createElement('button');
        btn.className = 'section-tab' + (idx === 0 ? ' active' : '');
        btn.textContent = 'Part ' + (idx + 1);
        btn.onclick = function() { switchSection(idx, btn); };
        tabTray.appendChild(btn);
      });

      document.getElementById('scratchpadText').value = localStorage.getItem('scratchpad_listening_' + testId) || '';
      loadSection();
    }

    function updateTimerDisplay(countUp) {
      var m = Math.floor(Math.abs(timeRemaining) / 60);
      var s = Math.abs(timeRemaining) % 60;
      document.getElementById('timerText').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    }

    function switchSection(idx, btnEl) {
      currentSectionIdx = idx;
      document.querySelectorAll('.section-tab').forEach(function(b) { b.classList.remove('active'); });
      btnEl.classList.add('active');
      loadSection();
      setTimeout(function() {
        var t = document.getElementById('qcard-' + currentQuestionNum);
        if (t) t.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }

    function loadSection() {
      var section = testData.listening.sections[currentSectionIdx];
      document.getElementById('sectionTitle').textContent = section.title;
      document.getElementById('sectionSubLabel').textContent = 'Part ' + (currentSectionIdx + 1);
      audio.src = section.audio;
      audio.load();
      stopAudio();
      renderQuestions();
    }

    audio.addEventListener('timeupdate', function() {
      if (audio.duration) {
        timeline.value = (audio.currentTime / audio.duration) * 100;
        var fmt = function(t) { return Math.floor(t/60) + ':' + String(Math.floor(t%60)).padStart(2,'0'); };
        document.getElementById('currentTime').textContent = fmt(audio.currentTime);
        document.getElementById('totalDuration').textContent = fmt(audio.duration);
      }
    });
    audio.addEventListener('ended', function() { playBtn.textContent = '?'; });

    function togglePlay() {
      if (audio.paused) { audio.play(); playBtn.textContent = '?'; }
      else { audio.pause(); playBtn.textContent = '?'; }
    }
    function stopAudio() {
      audio.pause(); audio.currentTime = 0; playBtn.textContent = '?';
      timeline.value = 0; document.getElementById('currentTime').textContent = '0:00';
    }
    function seekAudio(pct) { if (audio.duration) audio.currentTime = (pct / 100) * audio.duration; }
    function setPlaybackSpeed(s) { audio.playbackRate = parseFloat(s); }

    function renderQuestions() {
      var section = testData.listening.sections[currentSectionIdx];
      var container = document.getElementById('questionsContainer');
      container.innerHTML = '';
      var lastInstruction = null;

      section.questions.forEach(function(q, idx) {
        if (q.instruction && q.instruction.trim()) {
          if (q.instruction !== lastInstruction) {
            var banner = document.createElement('div');
            banner.className = 'instruction-banner';
            banner.innerHTML = q.instruction;
            container.appendChild(banner);
            lastInstruction = q.instruction;
          }
        } else {
          lastInstruction = null;
        }

        var card = document.createElement('div');
        card.className = 'q-card' + (flaggedQuestions[q.num] ? ' flagged' : '') + (userAnswers[q.num] ? ' answered' : '');
        card.id = 'qcard-' + q.num;

        var header = document.createElement('div');
        header.className = 'q-header';
        header.innerHTML = '<span class="q-label">Question ' + q.num + '</span>' +
          '<label class="q-review-label"><input type="checkbox" onchange="toggleFlag(' + q.num + ')" ' + (flaggedQuestions[q.num] ? 'checked' : '') + ' /> Review ??</label>';
        card.appendChild(header);

        var body = document.createElement('div');
        body.className = 'q-body';

        if (q.type === 'FILL') {
          var val = (userAnswers[q.num] || '').replace(/"/g, '&quot;');
          var inputHtml = '<input type="text" class="q-blank-input" oninput="handleInput(' + q.num + ', this.value)" value="' + val + '" placeholder="(' + q.num + ')" id="input-' + q.num + '" />';
          var textWithInput = q.text.replace(/________+/g, inputHtml);
          if (textWithInput === q.text) textWithInput = q.text + ' ' + inputHtml;
          body.innerHTML = textWithInput;
        } else if (q.type === 'MCQ') {
          body.innerHTML = '<div style="margin-bottom:8px;">' + q.text + '</div>';
          var optionsDiv = document.createElement('div');
          optionsDiv.className = 'mcq-options';
          var selected = userAnswers[q.num] || '';
          q.options.forEach(function(opt) {
            var dotIdx = opt.indexOf('.');
            var letter = dotIdx !== -1 ? opt.slice(0, dotIdx).trim() : opt.trim();
            var text = dotIdx !== -1 ? opt.slice(dotIdx + 1).trim() : '';
            var optEl = document.createElement('div');
            optEl.className = 'mcq-option' + (selected === letter ? ' selected' : '');
            optEl.innerHTML = '<span class="opt-letter">' + letter + '.</span><span>' + text + '</span>';
            optEl.onclick = function() { selectOption(q.num, letter); };
            optionsDiv.appendChild(optEl);
          });
          body.appendChild(optionsDiv);
        }
        card.appendChild(body);

        if (currentTestMode === 'practice') {
          var practRow = document.createElement('div');
          practRow.style.cssText = 'display:flex;justify-content:flex-end;border-top:1px solid #f1f5f9;margin-top:12px;padding-top:10px;';
          practRow.id = 'pract-actions-' + q.num;
          practRow.innerHTML = '<button class="check-btn" onclick="checkPracticeAnswer(' + q.num + ', ' + idx + ')">Check Answer</button>';
          card.appendChild(practRow);
          var feedbackDiv = document.createElement('div');
          feedbackDiv.id = 'pract-feedback-' + q.num;
          card.appendChild(feedbackDiv);
        }

        container.appendChild(card);
      });

      renderBottomTray();
    }

    function renderBottomTray() {
      var tray = document.getElementById('bottomNavTray');
      tray.innerHTML = '';
      testData.listening.sections.forEach(function(sec, sIdx) {
        sec.questions.forEach(function(q) {
          var btn = document.createElement('button');
          btn.className = 'q-nav-btn' + (userAnswers[q.num] ? ' answered' : '') + (flaggedQuestions[q.num] ? ' flagged' : '') + (q.num === currentQuestionNum ? ' current' : '');
          btn.textContent = q.num;
          btn.onclick = function() {
            currentQuestionNum = q.num;
            if (sIdx !== currentSectionIdx) {
              var tabBtn = document.querySelectorAll('.section-tab')[sIdx];
              switchSection(sIdx, tabBtn);
            } else {
              var targetBox = document.getElementById('qcard-' + q.num);
              if (targetBox) targetBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
              document.querySelectorAll('.q-nav-btn').forEach(function(b) {
                b.classList.remove('current');
                if (parseInt(b.textContent) === q.num) b.classList.add('current');
              });
            }
          };
          tray.appendChild(btn);
        });
      });
    }

    function selectOption(qNum, val) {
      userAnswers[qNum] = val;
      renderQuestions();
    }

    function handleInput(qNum, val) {
      userAnswers[qNum] = val;
      document.querySelectorAll('.q-nav-btn').forEach(function(btn) {
        if (parseInt(btn.textContent) === qNum) {
          if (val.trim()) btn.classList.add('answered'); else btn.classList.remove('answered');
        }
      });
      var card = document.getElementById('qcard-' + qNum);
      if (card) { if (val.trim()) card.classList.add('answered'); else card.classList.remove('answered'); }
    }

    function toggleFlag(qNum) {
      flaggedQuestions[qNum] = !flaggedQuestions[qNum];
      renderQuestions();
    }

    function checkPracticeAnswer(qNum, idx) {
      var section = testData.listening.sections[currentSectionIdx];
      var q = section.questions[idx];
      var uAns = (userAnswers[qNum] || '').trim().toLowerCase();
      var cAns = q.answer.trim().toLowerCase();
      var isCorrect = uAns === cAns;
      var fd = document.getElementById('pract-feedback-' + qNum);
      if (!fd) return;
      if (isCorrect) {
        fd.className = 'feedback-correct';
        fd.innerHTML = '<strong>? Correct!</strong> ' + q.explanation;
      } else {
        fd.className = 'feedback-wrong';
        fd.innerHTML = '<strong>? Incorrect</strong><br>Your answer: <span style="text-decoration:line-through;">' + escapeHtml(userAnswers[qNum] || 'None') + '</span><br>Correct: <strong style="color:#059669;">' + escapeHtml(q.answer) + '</strong><br><span style="color:#6b7280;display:block;margin-top:4px;">' + q.explanation + '</span>';
      }
    }

    function toggleScratchpad() {
      var sp = document.getElementById('scratchpad');
      sp.style.display = sp.style.display === 'none' ? 'block' : 'none';
    }
    function saveScratchpad() {
      localStorage.setItem('scratchpad_listening_' + testId, document.getElementById('scratchpadText').value);
    }

    function navigateQuestion(dir) {
      var totalQs = 0;
      testData.listening.sections.forEach(function(sec) { totalQs += sec.questions.length; });
      var next = currentQuestionNum + dir;
      if (next < 1 || next > totalQs) return;
      currentQuestionNum = next;
      var targetSectionIdx = -1;
      testData.listening.sections.forEach(function(sec, sIdx) {
        if (sec.questions.some(function(q) { return q.num === currentQuestionNum; })) targetSectionIdx = sIdx;
      });
      if (targetSectionIdx !== -1) {
        if (targetSectionIdx !== currentSectionIdx) {
          var tabBtn = document.querySelectorAll('.section-tab')[targetSectionIdx];
          switchSection(targetSectionIdx, tabBtn);
        } else {
          var t = document.getElementById('qcard-' + currentQuestionNum);
          if (t) t.scrollIntoView({ behavior: 'smooth', block: 'center' });
          document.querySelectorAll('.q-nav-btn').forEach(function(b) {
            b.classList.remove('current');
            if (parseInt(b.textContent) === currentQuestionNum) b.classList.add('current');
          });
        }
      }
    }

    function submitTest(autoSubmit) {
      if (!autoSubmit && !confirm('Are you sure you want to submit the test?')) return;
      clearInterval(timerInterval);
      audio.pause();
      var correctCount = 0, totalQs = 0;
      testData.listening.sections.forEach(function(sec) {
        sec.questions.forEach(function(q) {
          totalQs++;
          if ((userAnswers[q.num] || '').trim().toLowerCase() === q.answer.trim().toLowerCase()) correctCount++;
        });
      });
      var pct = correctCount / totalQs;
      var band = 4.0;
      if (pct >= 0.95) band = 9.0; else if (pct >= 0.88) band = 8.5;
      else if (pct >= 0.80) band = 8.0; else if (pct >= 0.72) band = 7.5;
      else if (pct >= 0.65) band = 7.0; else if (pct >= 0.58) band = 6.5;
      else if (pct >= 0.50) band = 6.0; else if (pct >= 0.40) band = 5.5;
      else if (pct >= 0.30) band = 5.0;

      localStorage.setItem('score_test_' + testId + '_listening', band.toFixed(1));

      var supabaseUrl = localStorage.getItem('supabase_url');
      var supabaseKey = localStorage.getItem('supabase_key');
      var userEmail = localStorage.getItem('userEmail');
      if (supabaseUrl && supabaseKey && userEmail) {
        try {
          var sc = supabase.createClient(supabaseUrl, supabaseKey);
          sc.from('students').select('id').eq('email', userEmail).single().then(function(res) {
            if (res.data) {
              sc.from('mock_history').insert({ student_id: res.data.id, test_name: testData.title, module_type: 'listening', listening_band: parseFloat(band.toFixed(1)), reading_band: null }).then(function(r) { if (r.error) console.error(r.error); });
            }
          });
        } catch(e) { console.error(e); }
      }

      var allStudents = JSON.parse(localStorage.getItem('viatestprep_students') || '[]');
      var student = allStudents.find(function(s) { return s.email && s.email.toLowerCase() === (userEmail || '').toLowerCase(); });
      if (student) {
        if (!student.mockHistory) student.mockHistory = [];
        student.mockHistory = student.mockHistory.filter(function(h) { return h.test !== testData.title || h.listening === '—'; });
        student.mockHistory.push({ test: testData.title, date: new Date().toISOString().split('T')[0], listening: band.toFixed(1), reading: '—', writing: '—', overall: band.toFixed(1) });
        localStorage.setItem('viatestprep_students', JSON.stringify(allStudents));
      }

      alert('Test Submitted!\nYour Score: ' + correctCount + '/' + totalQs + '\nEstimated IELTS Band: ' + band.toFixed(1));
      renderReviewMode();
    }

    function renderReviewMode() {
      document.getElementById('modeIndicator').textContent = 'Mode: Review';
      var sb = document.getElementById('submitBtn'); if (sb) sb.remove();
      var returnBtn = document.createElement('a');
      returnBtn.href = 'index.html';
      returnBtn.style.cssText = 'padding:6px 14px;border-radius:9px;background:#10b981;color:#fff;font-size:12px;font-weight:700;text-decoration:none;';
      returnBtn.textContent = 'Return to Lobby';
      document.querySelector('.site-header').appendChild(returnBtn);

      var section = testData.listening.sections[currentSectionIdx];
      var transBox = document.getElementById('transcriptBox');
      document.getElementById('transcriptContent').innerHTML = section.transcript;
      transBox.style.display = 'block';

      var container = document.getElementById('questionsContainer');
      container.innerHTML = '';
      section.questions.forEach(function(q) {
        var uAns = (userAnswers[q.num] || '').trim();
        var cAns = q.answer.trim();
        var isCorrect = uAns.toLowerCase() === cAns.toLowerCase();
        var card = document.createElement('div');
        card.className = 'review-card ' + (isCorrect ? 'correct' : 'wrong');
        card.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><span style="font-size:11px;font-weight:800;text-transform:uppercase;color:' + (isCorrect ? '#065f46' : '#991b1b') + ';">' + (isCorrect ? '?' : '?') + ' Question ' + q.num + ' — ' + (isCorrect ? 'Correct' : 'Incorrect') + '</span></div>' +
          '<p style="font-size:14px;font-weight:600;margin:0 0 8px;">' + q.text + '</p>' +
          '<div style="font-size:12px;color:#475569;"><div>Your answer: <strong style="color:' + (isCorrect ? '#059669' : '#dc2626') + '">' + escapeHtml(uAns || 'None') + '</strong></div>' +
          (!isCorrect ? '<div style="margin-top:4px;">Correct: <strong style="color:#059669;">' + escapeHtml(cAns) + '</strong></div>' : '') + '</div>' +
          '<div style="margin-top:10px;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:12px;color:#64748b;"><strong style="color:#334155;display:block;margin-bottom:4px;">Explanation:</strong>' + q.explanation + '</div>';
        container.appendChild(card);
      });
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    initTest();
  </script>
</body>
</html>
